<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LinWeb · 播放</title>
<!-- one icon: Edge/Chrome lighten a dark monochrome favicon themselves on a dark
     tab strip (verified on the real strip), so a media-switched white twin would
     only risk white-on-white where they do not. icon-white.png is for in-page use. -->
<link rel="icon" href="./icon.png">

<!--
  The dedicated Emby player. emby.html resolves a DIRECT stream URL and hands it
  here with the item id, session, resume position, and the audio + subtitle the
  viewer picked in the detail page. This page owns the whole playback session:
  it reports start / progress / stopped back to Emby (so resume works both ways),
  pre-selects the chosen audio track, and pre-enables the chosen subtitle -- ass/
  pgs drawn in-browser, text subs served by Emby into a native <track>. The MSE
  engine, subtitle renderers and in-frame controls are the same ones index.html
  uses; only the chrome and the Emby glue differ.
-->
<style>
  :root {
    color-scheme: dark;
    --bg:#0a0c0f; --panel:#12161b; --panel-2:#171c22; --line:#232a33;
    --fg:#e8ecf1; --dim:#8a95a3; --faint:#5c6672;
    --acc:#4c9aff; --acc-dim:#2b5c99;
    --ok:#5fd68a; --warn:#f0b429; --err:#ff6b63; --dv:#f5c451;
    --r:8px;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.55 ui-sans-serif,system-ui,"Segoe UI",-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button, input, select { font:inherit; color:inherit; }

  header {
    display:flex; align-items:center; gap:14px;
    padding:12px 20px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#12161b,#0f1317);
  }
  .btn {
    background:var(--panel-2); border:1px solid var(--line); border-radius:6px;
    padding:7px 13px; cursor:pointer; transition:.14s; white-space:nowrap; text-decoration:none;
  }
  .btn:hover { border-color:var(--acc-dim); background:#1c232b; }
  .btn.ghost { background:transparent; color:var(--dim); }
  .btn.ghost:hover { color:var(--fg); }
  .title { font-weight:600; letter-spacing:-.01em; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .spacer { flex:1; }

  main { display:grid; grid-template-columns:minmax(0,1fr) 330px; gap:18px; padding:18px 20px 28px; align-items:start; }
  @media (max-width:960px) { main { grid-template-columns:minmax(0,1fr); } }

  #stage {
    position:relative; background:#000; border-radius:var(--r);
    overflow:hidden; aspect-ratio:16/9; border:1px solid var(--line);
  }
  video { width:100%; height:100%; display:block; background:#000; }
  #stage canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  /* Edge composites JASSUB's worker OffscreenCanvas as an opaque quad windowed,
     blacking out the picture. `screen` blend fixed that but, being lighten-only,
     erased dark subtitle fills (left only the outline). A `filter` forces the
     same alpha-aware composite surface without touching colour, so fill + outline
     render true. Dropped in fullscreen (alpha honoured there). .JASSUB only. */
  #stage canvas.JASSUB { filter: opacity(0.996); }
  #stage:fullscreen canvas.JASSUB { filter: none; }
  /* Anime4K's opaque output canvas covers the video; danmaku goes over that and
     subtitle canvases over everything -- subtitles are the layer that must stay
     readable, comments are the layer you chose to add. */
  #stage canvas.A4K { z-index:1; }
  #stage canvas:not(.A4K) { z-index:3; }
  video::cue { background:rgba(0,0,0,.55); color:#fff; }

  .placeholder {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; color:var(--faint);
    text-align:center; padding:24px; pointer-events:none;
  }
  .placeholder svg { width:40px; height:40px; opacity:.5; }
  .placeholder b { color:var(--dim); font-weight:500; }

  aside { display:flex; flex-direction:column; gap:12px; min-width:0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:13px 14px; }
  .card > h2 { font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--faint); margin:0 0 10px; font-weight:650; }

  .kv { display:grid; grid-template-columns:auto minmax(0,1fr); gap:3px 12px; font-size:13px; margin:0; }
  .kv dt { color:var(--faint); }
  .kv dd { margin:0; font-variant-numeric:tabular-nums; min-width:0; overflow-wrap:anywhere; }

  .badges { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:11px; }
  .badge { padding:2px 8px; border-radius:4px; font-size:10.5px; font-weight:650; letter-spacing:.03em; }
  .b-hdr { background:#12351f; color:var(--ok); }
  .b-dv  { background:#3a2c12; color:var(--dv); }
  .b-warn{ background:#3a1614; color:var(--err); }
  .b-ok  { background:#14283c; color:#7ab8ff; }

  .note { margin-top:9px; font-size:12px; line-height:1.5; color:var(--dim); }
  .dim { color:var(--dim); }
  .empty { color:var(--faint); font-size:12.5px; }

  details.log summary {
    cursor:pointer; list-style:none; font-size:10.5px; text-transform:uppercase;
    letter-spacing:.09em; color:var(--faint); font-weight:650; display:flex;
    align-items:center; justify-content:space-between;
  }
  details.log summary::-webkit-details-marker { display:none; }
  details.log summary::after { content:'▾'; transition:.15s; }
  details.log[open] summary::after { transform:rotate(180deg); }
  #log { font:11px/1.5 ui-monospace,Consolas,monospace; max-height:220px; overflow:auto; white-space:pre-wrap; color:var(--dim); margin-top:9px; overflow-wrap:anywhere; }
  #log .error { color:var(--err); } #log .warn { color:var(--warn); }
  #log time { color:var(--faint); margin-right:6px; }

  /* in-frame controls: same proportions as index.html */
  .vctl {
    position:absolute; left:0; right:0; bottom:0; z-index:4;
    display:flex; flex-direction:column; gap:2px; padding:26px 12px 8px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.78));
    color:#fff; opacity:1; transition:opacity .25s ease;
  }
  #stage.idle .vctl { opacity:0; pointer-events:none; }
  #stage.idle { cursor:none; }
  .vrow { display:flex; align-items:center; gap:4px; }
  .vspacer { flex:1; }
  .vbtn {
    width:40px; height:40px; padding:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:transparent; border:0; border-radius:6px; cursor:pointer;
    color:#fff; transition:background .15s, opacity .15s;
  }
  .vbtn:hover { background:rgba(255,255,255,.13); }
  .vbtn:active { opacity:.65; }
  .vbtn svg { width:22px; height:22px; display:block; }
  .vbtn:focus-visible, .seek:focus-visible, .vol:focus-visible { outline:2px solid var(--acc); outline-offset:2px; }
  .seek { height:16px; display:flex; align-items:center; cursor:pointer; padding:0 2px; }
  .seek-rail { position:relative; width:100%; height:5px; border-radius:3px; background:rgba(255,255,255,.26); transition:height .12s ease; }
  .seek:hover .seek-rail, .seek:focus-visible .seek-rail { height:7px; }
  .seek-buf, .seek-fill { position:absolute; left:0; top:0; height:100%; border-radius:3px; }
  .seek-buf  { background:rgba(255,255,255,.28); width:0; }
  .seek-fill { background:var(--acc); width:0; }
  .seek-fill::after { content:''; position:absolute; right:-6px; top:50%; transform:translateY(-50%); width:12px; height:12px; border-radius:50%; background:#fff; opacity:0; transition:opacity .12s; }
  .seek:hover .seek-fill::after, .seek:focus-visible .seek-fill::after { opacity:1; }
  .volume { display:flex; align-items:center; }
  .vol { width:0; opacity:0; height:4px; margin-left:0; accent-color:var(--acc); cursor:pointer; transition:width .18s ease, opacity .18s ease, margin-left .18s ease; }
  .volume:hover .vol, .vol:focus-visible { width:62px; opacity:1; margin-left:6px; margin-right:6px; }
  .vtime { font:12.5px/1 ui-monospace, Consolas, monospace; font-variant-numeric:tabular-nums; padding:0 8px; white-space:nowrap; opacity:.95; }
  .vtime i { opacity:.45; font-style:normal; margin:0 2px; }
  .menu-wrap { position:relative; }
  /* Layout only -- the rows, fields and two-level navigation are styled by
     src/ui/menu.js so both players stay identical without a copied block. */
  .menu {
    position:absolute; bottom:calc(100% + 8px); right:0;
    background:rgba(20,24,30,.97); border:1px solid rgba(255,255,255,.12);
    border-radius:8px; box-shadow:0 8px 26px rgba(0,0,0,.5); z-index:10;
  }
  .menu[hidden] { display:none; }
  .vbtn.on { color:var(--acc); }
  .vbtn.on::after { content:''; position:absolute; bottom:5px; width:14px; height:2px; border-radius:2px; background:currentColor; }
  .vbtn { position:relative; }
  #dropHint {
    position:absolute; inset:0; z-index:9; display:none; place-items:center;
    background:rgba(10,12,15,.72); border:2px dashed var(--acc); border-radius:var(--r);
    color:var(--fg); font-weight:600; pointer-events:none;
  }
  #stage.dragging #dropHint { display:grid; }
  #stage:fullscreen { border-radius:0; border:0; aspect-ratio:auto; width:100vw; height:100vh; }
  #stage:fullscreen video { object-fit:contain; }
</style>

<header>
  <a class="btn ghost" id="backBtn" href="./emby.html">← 返回</a>
  <div class="title" id="title">播放</div>
  <div class="spacer"></div>
</header>

<main>
  <div>
    <div id="stage">
      <video id="video" playsinline></video>
      <div class="vctl" id="vctl" hidden>
        <div class="seek" id="seek" role="slider" tabindex="0" aria-label="进度" aria-valuemin="0" aria-valuenow="0">
          <div class="seek-rail"><div class="seek-buf" id="seekBuf"></div><div class="seek-fill" id="seekFill"></div></div>
        </div>
        <div class="vrow">
          <button class="vbtn" id="ppBtn" aria-label="播放/暂停"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></button>
          <div class="volume">
            <button class="vbtn" id="muteBtn" aria-label="静音"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4.7 6.4 9H3v6h3.4l4.6 4.3z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.7 5.3a9 9 0 0 1 0 13.4"/></svg></button>
            <input type="range" id="vol" class="vol" min="0" max="1" step="0.02" value="1" aria-label="音量">
          </div>
          <span class="vtime"><span id="tNow">0:00</span> <i>/</i> <span id="tEnd">0:00</span></span>
          <div class="vspacer"></div>
          <button class="vbtn" id="dmkBtn" aria-label="弹幕" aria-pressed="false" hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M6 10h5"/><path d="M13 10h5"/><path d="M6 14h3"/><path d="M11 14h7"/></svg></button>
          <div class="menu-wrap">
            <button class="vbtn" id="gearBtn" aria-label="轨道设置" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
            <div class="menu" id="picks" role="menu" hidden></div>
          </div>
          <button class="vbtn" id="fsBtn" aria-label="全屏"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
        </div>
      </div>
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m10 9 5 3-5 3z"/></svg>
        <b id="phText">正在解析…</b>
      </div>
      <div id="dropHint">松手载入弹幕文件（.xml / .json）</div>
    </div>
  </div>

  <aside>
    <div class="card">
      <h2>来源</h2>
      <div id="meta" class="empty">读取中…</div>
    </div>
    <details class="card log" id="logCard">
      <summary>日志</summary>
      <div id="log"></div>
    </details>
  </aside>
</main>

<script type="module">
import { Player } from '../src/player.js';
import { Subtitles, attachSrt } from '../src/subs/index.js';
import { VolumeStage } from '../src/audio/gain.js';
import { EmbyClient, reline } from '../src/emby/client.js';
import { Anime4K } from '../src/video/anime4k.js';
import { SettingsMenu, menuStyles } from '../src/ui/menu.js';
import { touchStyles, attachTouch, fullscreen } from '../src/ui/touch.js';
import { DanmakuLayer, loadRenderer, source, parseAny, loadSettings, saveSettings, loadTrack, saveTrack, forgetTrack } from '../src/danmaku/index.js';

const $ = s => document.querySelector(s);
const video = $('#video');
const stage = $('#stage');   // every overlay (subtitles, Anime4K, danmaku) layers into this
const player = new Player(video);
const subs = new Subtitles(player, { log: (m, l) => player.log(m, l) });
const volume = new VolumeStage(video, { log: (m, l) => player.log(m, l) });
const anime4k = new Anime4K(video, { log: (m, l) => player.log(m, l) });

const logEl = $('#log');
player.log = (msg, level = 'info') => {
  const line = document.createElement('div');
  line.className = level;
  const t = document.createElement('time');
  t.textContent = new Date().toLocaleTimeString('en-GB');
  line.append(t, msg);
  logEl.append(line);
  logEl.scrollTop = logEl.scrollHeight;
  if (level === 'error') $('#logCard').open = true;
};

const fmtBytes = n => n > 1e9 ? `${(n / 2 ** 30).toFixed(2)} GB` : `${(n / 2 ** 20).toFixed(1)} MB`;
const fmtTime = s => {
  if (!Number.isFinite(s) || s <= 0) return '未知';
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = Math.floor(s % 60);
  return h ? `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}` : `${m}:${String(sec).padStart(2, '0')}`;
};

// ---- what emby.html handed us -------------------------------------------
const P = new URLSearchParams(location.search);
const WANT = {
  url: P.get('url'),
  title: P.get('title') || '播放',
  id: P.get('id'), src: P.get('src'), ps: P.get('ps'),
  size: Number(P.get('size')) || 0,
  t: Number(P.get('t')) || 0,
  aud: P.has('aud') ? Number(P.get('aud')) : 0, audlang: P.get('audlang') || '',
  sub: P.has('sub') ? Number(P.get('sub')) : null, sublang: P.get('sublang') || '',
  // The URL inside a .strm, when there is one. A candidate, never a promise --
  // see sources() for the order it is tried in.
  direct: P.get('direct') || '',
  suburl: P.get('suburl'), sublabel: P.get('sublabel') || '字幕',
  subwarn: P.get('subwarn'),
  // What a danmaku lookup needs. emby.html sends them explicitly; when this page
  // is opened by hand they are recovered from the "Name S01E02 · Title" title,
  // because a series name plus an episode number is the whole query.
  series: P.get('series') || '',
  ep: Number(P.get('ep')) || 0,
};
if (!WANT.series || !WANT.ep) {
  const m = /^(.*?)\s*S(\d+)E(\d+)/i.exec(WANT.title);
  if (m) { WANT.series ||= m[1].trim(); WANT.ep ||= Number(m[3]); }
}
$('#title').textContent = WANT.title;
document.title = `LinWeb · ${WANT.title}`;

// The live Emby session, rebuilt from localStorage, so this page can report
// progress back. Null if the user reached play.html without logging in.
const EM = EmbyClient.restore();
const srcRef = { Id: WANT.src };

let info = null;
let a4kMode = 'off';        // surviving Anime4K choice: 'off' | 'A' | 'B' | 'C'
// The domain this page is streaming from. emby.html built WANT.url against it,
// so it is also the prefix switchLine() rewrites away from.
const LINES = EM ? EM.allLines() : [];
let line = EM?.server || '';

// ---- where the bytes come from ------------------------------------------
// A .strm item can be fetched two ways, and they are not equivalent:
//
//   direct  — straight from the URL the .strm holds. No bytes touch Emby, so
//             the server stops being the bottleneck and pays no egress. But the
//             remote must send CORS headers, must not gate on Referer/UA, and
//             its signature must outlive the film.
//   server  — Emby reads the remote and proxies it. Always same-origin-ish and
//             always CORS-clean (we already rely on that everywhere else), at
//             the cost of pushing every byte through the server twice.
//
// Direct is tried first and the server is the safety net, so a remote that
// refuses the browser costs one failed probe rather than a broken playback.
// `preferDirect` lets a viewer turn it off for the opposite case the ladder
// cannot detect: a remote the browser CAN reach but only slowly, where the
// server's fatter pipe wins. Remembered, because that is a property of a
// deployment, not of one film.
const PREFER_KEY = 'linweb:preferDirect';
let preferDirect = localStorage.getItem(PREFER_KEY) !== '0';
const serverSource = () => (WANT.size ? { url: WANT.url, size: WANT.size } : WANT.url);
const sources = () => (preferDirect && WANT.direct ? [WANT.direct, serverSource()] : [serverSource()]);

async function load(input) {
  try {
    await subs.destroy();
    anime4k.stop();
    volume.restart();
    info = await player.loadAny(input);
    usingDirect = !!WANT.direct && player.openedFrom === WANT.direct;
    if (WANT.direct) player.log(usingDirect ? '字节来源：直连远程存储（未经服务器中转）' : '字节来源：经 Emby 服务器代理');
    render();
  } catch (e) {
    info = null;
    // The LAST candidate, not the first: loadAny() rethrows the last failure, so
    // that is the URL the message is about (and the one a mixed-content check
    // has to look at).
    $('#phText').innerHTML = explain(e, [].concat(input).pop());
    player.log(e.message, 'error');
    console.error(e);
  }
}
let usingDirect = false;

// A read that dies AFTER playback started -- the classic being a presigned URL
// that expired mid-film. The direct candidate is dropped for the rest of the
// session (re-opening it would only expire again) and the stream is re-opened
// through the server at the current position, exactly as a line switch does.
player.onStalled = ({ message, position }) => {
  if (!usingDirect || switching) return;
  usingDirect = false;
  preferDirect = false;                     // this session only; not persisted
  player.log(`直连中断（${message}）— 改由 Emby 服务器接管，从 ${Math.round(position)}s 继续`, 'warn');
  armResume(video.currentTime || position);
  load(sources());
};

function explain(e, input) {
  // http video URL on a https page = mixed content, blocked before any request.
  // The direct stream URL from a local http Emby trips this constantly.
  const inUrl = typeof input === 'string' ? input : input?.url;
  if (typeof inUrl === 'string' && location.protocol === 'https:' && /^http:\/\//i.test(inUrl))
    return '混合内容被拦截：本页是 HTTPS，视频地址是 http://，浏览器直接禁止读取（不是 CORS）。请让 Emby 走 https，或用 http 打开 LinWeb，或加一层 https 反代。';
  if (/does not support Range/i.test(e.message)) return '服务器未开放 Range 请求，无法 seek。';
  // The native leg already caught NO_RANGE/NO_SIZE/NOT_MATROSKA, so reaching
  // here with a fetch failure means the request never completed. For a remote
  // (.strm) source that has one extra likely cause worth naming: an object-store
  // signature that has expired answers 403 WITHOUT any CORS header, so the
  // browser reports it as an ordinary "Failed to fetch" and the real reason --
  // a dead link, not a misconfigured one -- is invisible from here.
  if (/Failed to fetch|NetworkError|CORS/i.test(e.message))
    return '无法读取该地址。可能是：① 服务器未放行 CORS（Access-Control-Allow-Origin），'
      + '或未把 Range 列入 Access-Control-Allow-Headers；② 直链签名已过期——对象存储在签名失效时返回 403 '
      + '且不带 CORS 头，浏览器只能报成同一个错；③ 远程源校验 Referer/User-Agent，浏览器无法伪造，'
      + '这种源只能让 Emby 服务端代理。自签 https 还需证书受信。';
  return e.message;
}

// The native leg reads no bytes, so everything built on reading them is gone:
// track choice, client-side ass/pgs, the HDR verdict. Two of them can still
// survive -- Anime4K needs pixels off the canvas and the gain stage needs
// createMediaElementSource, and BOTH require the media element to have loaded
// with valid CORS. player.loadNative() records whether it managed that.
// Offering either without it would be worse than hiding them: the canvas throws
// SecurityError, and createMediaElementSource silences the video permanently
// (it cannot be undone -- see src/audio/gain.js).
const extrasOk = () => !!info && (!info.native || info.nativeCors);

function render() {
  $('#placeholder').style.display = 'none';

  const badges = [];
  if (info.hdr) badges.push(`<span class="badge b-hdr">HDR ${info.hdr.transfer}</span>`);
  if (info.dynamicHdr) badges.push(`<span class="badge b-hdr">${info.hdr10plus ? 'HDR10+' : 'HDR Vivid'}</span>`);
  if (info.dolbyVision) badges.push(`<span class="badge ${info.dolbyVision.playable ? 'b-dv' : 'b-warn'}">Dolby Vision P${info.dolbyVision.profile}</span>`);
  // Native: no demuxer ran, so nothing was measured. Say "unknown" rather than
  // let the SDR default below assert something nobody checked.
  if (info.native) badges.push('<span class="badge b-warn">原生播放 · 色彩未探测</span>');
  else if (!badges.length) badges.push('<span class="badge b-ok">SDR</span>');

  // Same decode read-out as the main page: video is hardware/GPU, exotic audio the
  // browser refuses is our WASM software decoder on the CPU.
  const codec = t => t.track.codecId.split('/').pop();
  const vTrack = info.video.find(v => v.supported) || info.video[0];
  const aTrack = info.audio[0];
  const decode = info.native
    ? `<dt>解码</dt><dd>整条流交给<b>浏览器原生解码</b>（未经重封装）`
      + `<br><span class="dim">${NATIVE_WHY[info.nativeReason] || info.nativeReason}</span></dd>`
    : vTrack ? `<dt>解码</dt><dd>视频 <b>硬件解码</b> · GPU (${codec(vTrack)})`
      + (aTrack ? `<br>音频 ${aTrack.supported ? `<b>浏览器原生</b> (${codec(aTrack)})` : `<b>软件解码</b> · CPU (${codec(aTrack)} → Opus)`}` : '')
      + `</dd>` : '';

  $('#meta').innerHTML = `
    <div class="badges">${badges.join('')}</div>
    <dl class="kv">
      ${info.size ? `<dt>大小</dt><dd>${fmtBytes(info.size)}</dd>` : ''}
      <dt>时长</dt><dd>${info.duration ? fmtTime(info.duration) : '未知'}</dd>
      ${info.hdr ? `<dt>色彩</dt><dd>${info.hdr.primaries} · ${info.hdr.bitDepth}-bit</dd>` : ''}
      ${info.fonts ? `<dt>字体</dt><dd>${info.fonts} 个内嵌</dd>` : ''}
      ${decode}
    </dl>`;

  // Honour the detail-page picks BEFORE start() reads them.
  seedChoice();
  paintMenu();

  // Native: the element is already loaded and holding the stream; start() would
  // only re-run a pipeline that does not exist. Everything after the src is the
  // same either way, so share it.
  if (info.native || info.video.some(v => v.supported)) start();
  else player.log('没有可播放的视频轨', 'error');
}

// Why this item fell back, in the viewer's terms. The codes come from
// src/demux/matroska.js; each one is a different thing to go fix server-side.
const NATIVE_WHY = {
  NOT_MATROSKA: '该源不是 Matroska 容器，无法重封装，已直接交给浏览器',
  UNKNOWN_CONTAINER: '这个容器 MKV / MP4 / MOV / WebM / FLV 都不是，本地无法拆封装，已交给浏览器解码',
  FRAGMENTED_MP4: '分片 mp4（moof/mvex）：索引不在 moov 里，无法随机读取，已交给浏览器解码',
  NOT_MP4: 'mp4 结构读不通（可能被截断），已交给浏览器解码',
  NOT_FLV: 'FLV 结构读不通，已交给浏览器解码',
  NO_SIZE: '服务器未告知文件总长度，无法随机读取，已直接交给浏览器',
  NO_RANGE: '服务器不支持 Range 请求，无法随机读取，已直接交给浏览器',
};

// ---- the settings menu ---------------------------------------------------
// Every track and every overlay used to add one more <select> to a single
// column that was already taller than a phone in portrait. The picks now live
// in a two-level panel (src/ui/menu.js): a root list of groups showing their
// current value, each opening into its own controls. Choices live HERE, in
// CHOICE, not in the DOM -- a control inside a closed panel does not exist.
const menu = new SettingsMenu($('#picks'));
document.head.append(Object.assign(document.createElement('style'), { textContent: menuStyles() + touchStyles() }));

const CHOICE = { video: 0, audio: 0, sub: -1, gain: '1' };
const label = (x, i) => x.label || `轨道 ${i + 1}`;

// Deliberately built even when `info` is null. The stream failing to load is
// exactly when a viewer needs the line picker, and an empty menu at that moment
// leaves them with no way out but the back button.
function buildGroups() {
  const a4kOk = info && Anime4K.supported && extrasOk() && !info.hdr && !info.dolbyVision;
  const A4K_NAMES = { off: '关闭', A: 'Mode A · 通用', B: 'Mode B · 柔化', C: 'Mode C · 去噪' };
  return [
    (LINES.length > 1 || WANT.direct) && {
      key: 'line', label: '线路',
      value: [LINES.length > 1 && LINES.find(l => l.url === line)?.name,
              WANT.direct && (usingDirect ? '直连' : '经服务器')].filter(Boolean).join(' · '),
      rows: [
        LINES.length > 1 && { type: 'select', id: 'line', label: '入口域名', value: line,
          options: LINES.map(l => ({ value: l.url, label: l.name })), onChange: v => switchLine(v) },
        // Only offered for a .strm item, because only there is there a second
        // place the bytes can come from. Switching re-opens the stream at the
        // current position, the same way an entry-domain switch does.
        WANT.direct && { type: 'select', id: 'direct', label: '字节来源', value: preferDirect ? '1' : '0',
          options: [{ value: '1', label: '直连远程存储' }, { value: '0', label: '经 Emby 服务器' }],
          onChange: v => switchByteSource(v === '1') },
        WANT.direct && { type: 'note', text: usingDirect
          ? '正在直连 .strm 指向的地址，服务器不参与传输。若中途签名过期会自动切回服务器。'
          : '正在经服务器代理。直连需要远程放行 CORS，且不能校验 Referer/UA。' },
      ].filter(Boolean),
    },
    // Native playback has no track list to offer -- the browser picked, and
    // there is no demuxer to switch with. Say so where the picker would be,
    // otherwise its absence looks like a bug.
    info?.native && {
      key: 'native', label: '播放方式', value: info.nativeCors ? '原生' : '原生 · 受限',
      rows: [{ type: 'note', text: (NATIVE_WHY[info.nativeReason] || '已回退到原生播放。')
        + '轨道切换、内嵌 ASS/PGS 字幕与 HDR 判定在这条通路上不可用。'
        + (info.nativeCors ? '' : ' 该源未放行跨域凭证，画面无法读回，超分与增益已一并停用。') }],
    },
    info && !info.native && {
      key: 'track', label: '轨道',
      value: [info.audio[CHOICE.audio] && label(info.audio[CHOICE.audio], CHOICE.audio),
              CHOICE.sub >= 0 ? label(info.subtitles[CHOICE.sub], CHOICE.sub) : '无字幕'].filter(Boolean).join(' · '),
      rows: [
        info.video.length > 1 && { type: 'select', id: 'video', label: '视频', value: CHOICE.video,
          options: info.video.map((x, i) => ({ value: i, label: label(x, i) + (x.supported ? '' : ' ✕ 无法播放'), disabled: !x.supported })),
          onChange: v => { CHOICE.video = Number(v); start(); } },
        info.audio.length && { type: 'select', id: 'audio', label: '音频', value: CHOICE.audio,
          options: info.audio.map((x, i) => ({ value: i, label: label(x, i) + (x.supported ? '' : ` — ${x.note?.name || '软解'}`) })),
          onChange: v => { CHOICE.audio = Number(v); start(); } },
        { type: 'select', id: 'sub', label: '字幕', value: CHOICE.sub,
          options: [{ value: -1, label: '关闭' }, ...info.subtitles.map((x, i) => {
            const ok = Subtitles.SUPPORTED.has(x.format);
            return { value: i, label: label(x, i) + (ok ? '' : ' ✕ 无渲染器'), disabled: !ok };
          })],
          onChange: v => applySubtitle(Number(v)) },
      ].filter(Boolean),
    },
    danmakuGroup(),
    info && volume.ok && extrasOk() && {
      key: 'gain', label: '响度', value: { 1: '原始', auto: '自动增益' }[CHOICE.gain] || `+${CHOICE.gain}×`,
      rows: [
        { type: 'select', id: 'gain', label: '增益', value: CHOICE.gain,
          options: [{ value: '1', label: '原始音量' }, { value: 'auto', label: '自动增益' },
                    { value: '1.5', label: '+3.5 dB' }, { value: '2', label: '+6 dB' }, { value: '3', label: '+9.5 dB' }],
          onChange: v => {
            CHOICE.gain = v;
            if (v === 'auto') { volume.setAuto(true); volume.boost = 1; }
            else { volume.setAuto(false); volume.boost = Number(v); }
            paintMenu();
          } },
        { type: 'note', text: gainNote() },
      ],
    },
    // SDR only -- see the main page and src/video/anime4k.js for why HDR is excluded.
    a4kOk && {
      key: 'a4k', label: '超分', value: A4K_NAMES[a4kMode],
      rows: [
        { type: 'select', id: 'a4k', label: '动画超分 Anime4K', value: a4kMode,
          options: Object.entries(A4K_NAMES).map(([value, label]) => ({ value, label })),
          onChange: v => { applyAnime4K(v); paintMenu(); } },
        { type: 'note', text: '仅 SDR 动画 · GPU 超分，开启时占用整帧渲染' },
      ],
    },
  ].filter(Boolean);
}

const paintMenu = () => menu.set(buildGroups());

// ---- danmaku -------------------------------------------------------------
// Comments fly over the picture from a track that is remembered per item: the
// second time an episode is opened they are simply there, no lookup, no
// network. Settings are global (localStorage), the track itself is per item
// (IndexedDB) -- see src/danmaku/store.js.
//
// Where a track comes from is the constrained part. dandanplay and bilibili
// both answer a browser with no Access-Control-Allow-Origin (measured: every
// /api/v2/* route 403s with "Missing Authentication Headers" and no CORS
// header at all), and dandanplay's signature needs an AppSecret, which cannot
// live in a page anyone can View Source on. So this page talks only to a
// dandanplay-SHAPED endpoint the viewer runs and configures here -- and works
// with no endpoint at all from a dropped file.
const DM = {
  layer: null,
  s: loadSettings(),
  key: WANT.id ? `emby:${WANT.id}` : '',
  name: '',            // where the loaded track came from
  busy: '',            // in-flight status, shown in the panel
  picks: [],           // match candidates, when there was more than one
};

function danmakuGroup() {
  if (!DM.layer) return null;
  const s = DM.s;
  const n = DM.layer.count;
  const canMatch = !!(s.api && (WANT.series || WANT.title));
  return {
    key: 'dmk', label: '弹幕',
    value: DM.busy || (n ? `${s.on ? '' : '已关闭 · '}${n} 条` : '未加载'),
    rows: [
      { type: 'toggle', id: 'dmkOn', label: '显示弹幕', value: s.on, onChange: v => { setDanmaku({ on: v }); } },
      { type: 'note', text: DM.busy || (n ? `${DM.name}｜${n} 条` : '还没有弹幕：自动匹配，或载入本地 .xml / .json 文件（也可直接拖进画面）') },
      { type: 'button', id: 'dmkMatch', label: '自动匹配弹幕', disabled: !canMatch || !!DM.busy,
        value: s.api ? '' : '需先填服务地址', onClick: autoMatch },
      DM.picks.length > 1 && { type: 'select', id: 'dmkPick', label: '匹配结果', value: '',
        options: [{ value: '', label: `${DM.picks.length} 个候选，选一个` }, ...DM.picks.map(p => ({ value: p.id, label: p.label }))],
        onChange: v => v && fetchEpisode(v) },
      { type: 'button', id: 'dmkFile', label: '载入本地弹幕文件', onClick: () => fileInput.click() },
      n && { type: 'button', id: 'dmkClear', label: '清除本片弹幕', onClick: clearDanmaku },
      { type: 'range', id: 'dmkOpacity', label: '不透明度', hint: `${Math.round(s.opacity * 100)}%`,
        min: 0.1, max: 1, step: 0.05, value: s.opacity, onInput: v => setDanmaku({ opacity: Number(v) }) },
      { type: 'range', id: 'dmkSize', label: '字号', hint: `${s.fontSize}`, min: 12, max: 48, step: 1, value: s.fontSize,
        onInput: v => setDanmaku({ fontSize: Number(v) }) },
      { type: 'range', id: 'dmkSpeed', label: '速度', hint: `${s.speed}`, min: 60, max: 320, step: 10, value: s.speed,
        onInput: v => setDanmaku({ speed: Number(v) }) },
      { type: 'range', id: 'dmkArea', label: '显示区域', hint: `画面上 ${Math.round(s.area * 100)}%`,
        min: 0.2, max: 1, step: 0.1, value: s.area, onInput: v => setDanmaku({ area: Number(v) }) },
      { type: 'range', id: 'dmkLimit', label: '每秒上限', hint: s.limit ? `${s.limit} 条` : '不限',
        min: 0, max: 40, step: 1, value: s.limit, onInput: v => setDanmaku({ limit: Number(v) }) },
      { type: 'text', id: 'dmkBlock', label: '屏蔽词（逗号分隔，/regex/ 亦可）', value: (s.block || []).join(','),
        placeholder: '前方高能,/^\\d+$/', onChange: v => setDanmaku({ block: v.split(',').map(x => x.trim()).filter(Boolean) }) },
      { type: 'text', id: 'dmkApi', label: '弹幕服务地址', value: s.api, placeholder: 'https://…（弹弹play 接口格式）',
        onChange: v => setDanmaku({ api: v.trim() }) },
      { type: 'note', text: '第三方弹幕站不放行浏览器跨域，且需要密钥——网页无法直连。填一个你自己部署的、兼容弹弹play接口的地址即可；留空则只用本地文件。' },
    ].filter(Boolean),
  };
}

/** The single write path for danmaku settings: persist, re-render, repaint. */
function setDanmaku(patch) {
  DM.s = { ...DM.s, ...patch };
  saveSettings(DM.s);
  DM.layer?.apply(DM.s);
  $('#dmkBtn').classList.toggle('on', DM.s.on);
  $('#dmkBtn').setAttribute('aria-pressed', String(DM.s.on));
  paintMenu();
}

function setTrack(list, name, persist = true) {
  DM.name = name;
  DM.busy = '';
  DM.layer.setComments(list, name);
  if (persist && DM.key) saveTrack(DM.key, name, list);
  player.log(`弹幕已载入: ${name}（${list.length} 条）`);
  setDanmaku(list.length ? { on: true } : {});
}

async function clearDanmaku() {
  DM.picks = [];
  DM.name = '';
  DM.layer.setComments([], '');
  await forgetTrack(DM.key);
  paintMenu();
}

/** Series name + episode number -> a comment track, via the configured server. */
async function autoMatch() {
  DM.picks = [];
  DM.busy = '匹配中…';
  paintMenu();
  try {
    const found = await source.episodes(DM.s.api, WANT.series || WANT.title, WANT.ep);
    if (!found.length) throw new Error('没有匹配到剧集');
    DM.picks = found;
    await fetchEpisode(found[0].id);
  } catch (e) {
    DM.busy = '';
    player.log(`弹幕匹配失败: ${e.message}`, 'warn');
    DM.busy = e.message;
    paintMenu();
  }
}

async function fetchEpisode(id) {
  const name = DM.picks.find(p => String(p.id) === String(id))?.label || `弹幕 ${id}`;
  DM.busy = '下载弹幕…';
  paintMenu();
  try {
    setTrack(await source.comments(DM.s.api, id), name);
  } catch (e) {
    DM.busy = e.message;
    player.log(`弹幕下载失败: ${e.message}`, 'warn');
    paintMenu();
  }
}

async function importFile(file) {
  if (!file) return;
  try {
    const list = parseAny(await file.text());
    if (!list.length) throw new Error('文件里没有可识别的弹幕');
    DM.picks = [];
    setTrack(list, file.name);
  } catch (e) { player.log(`弹幕文件读取失败: ${e.message}`, 'warn'); DM.busy = e.message; paintMenu(); }
}

const fileInput = Object.assign(document.createElement('input'), { type: 'file', accept: '.xml,.json,text/xml,application/json', hidden: true });
fileInput.addEventListener('change', () => { importFile(fileInput.files[0]); fileInput.value = ''; });
document.body.append(fileInput);

// Dropping a file on the picture is the shortest path, so it is also wired.
for (const ev of ['dragenter', 'dragover']) stage.addEventListener(ev, e => { e.preventDefault(); stage.classList.add('dragging'); });
for (const ev of ['dragleave', 'drop']) stage.addEventListener(ev, e => { if (ev === 'drop') e.preventDefault(); stage.classList.remove('dragging'); });
stage.addEventListener('drop', e => importFile(e.dataTransfer?.files?.[0]));

$('#dmkBtn').addEventListener('click', () => setDanmaku({ on: !DM.s.on }));

(async () => {
  try { await loadRenderer(); } catch (e) { return player.log(`弹幕渲染器加载失败: ${e.message}`, 'warn'); }
  DM.layer = new DanmakuLayer(video, stage, { log: player.log });
  $('#dmkBtn').hidden = false;
  const saved = await loadTrack(DM.key);
  if (saved?.comments?.length) { DM.name = saved.name; DM.layer.setComments(saved.comments, saved.name); }
  setDanmaku({});     // applies the stored settings and repaints the button
})();

// Positional first (the Emby stream list and the demuxed track list are both the
// container's tracks in order, so index N maps to index N); language only
// rescues an out-of-range index.
function pick(list, idx, lang) {
  if (idx != null && idx >= 0 && idx < list.length) return idx;
  if (lang) { const i = list.findIndex(x => (x.track.language || '').toLowerCase() === lang.toLowerCase()); if (i >= 0) return i; }
  return 0;
}

function seedChoice() {
  CHOICE.video = pick(info.video, 0, '');
  CHOICE.audio = pick(info.audio, WANT.aud, WANT.audlang);

  if (WANT.subwarn) player.log(`所选字幕为图形格式，浏览器暂无法外挂渲染：${WANT.subwarn}`, 'warn');
  if (WANT.suburl) {
    CHOICE.sub = -1;               // client renderer unused; Emby serves it as a <track>
    attachEmbySub();
  } else if (WANT.sub != null && info.subtitles.length) {
    // Guarded on length: a native (or unprobed .strm) source has no subtitle
    // list, and pick() answers 0 for an empty one -- which would then be asked
    // to render a track that does not exist.
    CHOICE.sub = pick(info.subtitles, WANT.sub, WANT.sublang);
  } else if (WANT.sub != null) {
    CHOICE.sub = -1;
    player.log('该源未解出字幕轨，客户端字幕不可用（可让 Emby 以 SRT 提供）', 'warn');
  }
}

// External / text subtitle: Emby serves it as SRT, drawn by the browser's own
// <track>. The <track> is a DOM child of <video>, so it survives the src swap
// each play() does; its mode is re-asserted on every metadata load.
let extTrack = null;
async function attachEmbySub() {
  // a reload (line switch) keeps the <track> that is already there
  if (extTrack) { extTrack.track.mode = 'showing'; return; }
  try {
    const srt = await fetch(WANT.suburl).then(r => { if (!r.ok) throw new Error('字幕 ' + r.status); return r.text(); });
    extTrack = attachSrt(video, srt, { label: WANT.sublabel, language: WANT.sublang || 'und', asDefault: true });
    video.addEventListener('loadedmetadata', () => { if (extTrack) extTrack.track.mode = 'showing'; });
    player.log(`字幕已开启（Emby 提供）: ${WANT.sublabel}`);
  } catch (e) { player.log(`字幕加载失败: ${e.message}`, 'warn'); }
}

function gainNote() {
  if (!volume.engaged) return '原始音量（未增益）';
  const m = volume.measuredDbfs;
  return m == null ? '测量中…' : `节目 ${m.toFixed(1)} dBFS · 已提升 ${volume.appliedDb.toFixed(1)} dB`;
}
// The reading changes as the loudness measurement settles, but repainting the
// menu under an open <select> would close it, so only the panel that shows it
// is refreshed.
setInterval(() => { if (menu.open === 'gain') paintMenu(); }, 1000);

async function applySubtitle(idx) {
  CHOICE.sub = idx;
  paintMenu();
  try {
    const started = await subs.select(idx);
    if (idx >= 0 && !started) { player.log('该字幕格式没有渲染器，未开启', 'warn'); CHOICE.sub = -1; }
    else if (idx >= 0) player.log(`字幕已开启: ${info.subtitles[idx].label}`);
  } catch (err) {
    player.log(`字幕开启失败: ${err.message}`, 'error');
    CHOICE.sub = -1;
  } finally { paintMenu(); }
}

/** Turn the Anime4K upscaler on/off. One path for the dropdown and start(). */
async function applyAnime4K(mode) {
  a4kMode = mode;
  try {
    anime4k.stop();
    if (mode !== 'off' && !(await anime4k.start(mode))) a4kMode = 'off';
  } finally { paintMenu(); }
}

async function start() {
  try {
    const wanted = CHOICE.sub;
    await subs.destroy();
    anime4k.stop();
    await player.play({ videoIndex: CHOICE.video, audioIndex: CHOICE.audio });   // no-op on the native leg
    await volume.resume().catch(() => {});
    await video.play().catch(e => player.log(`自动播放被拦截，按空格开始: ${e.message}`, 'warn'));
    if (wanted >= 0 && info.subtitles.length) await applySubtitle(wanted);
    if (a4kMode !== 'off' && Anime4K.supported && extrasOk() && !info.hdr && !info.dolbyVision) await applyAnime4K(a4kMode);
  } catch (e) { player.log(e.message, 'error'); console.error(e); }
}

// ---- resume position ----------------------------------------------------
// Used twice: the position emby.html handed over, and the playhead carried
// across a line switch (which reloads the stream from scratch).
let resumeAt = 0;
const seekOnce = () => {
  video.removeEventListener('loadeddata', seekOnce);
  const t = resumeAt; resumeAt = 0;
  if (t && Number.isFinite(video.duration) && t < video.duration) { try { video.currentTime = t; } catch {} }
};
function armResume(t) { if (!t) return; resumeAt = t; video.addEventListener('loadeddata', seekOnce); }
armResume(WANT.t);

// ---- line switching -----------------------------------------------------
// Same server, another entry domain (see EmbyClient#lines). Everything the
// session points at is re-pointed -- the stream, any Emby-served subtitle, and
// the client itself so progress reports and posters follow -- then the stream
// is reloaded at the current playhead. Nothing about the item changes, so the
// track choices are re-seeded by render() exactly as on first load.
let switching = false;

// Same item, the other place its bytes live. Only reachable for a .strm; the
// entry-domain switch below is the model -- remember the playhead, re-open,
// let render() re-seed the track choices. The preference is persisted because
// which side is faster is a property of the deployment, not of this film.
async function switchByteSource(direct) {
  if (switching || direct === preferDirect) return;
  switching = true;
  const at = video.currentTime;
  try {
    preferDirect = direct;
    localStorage.setItem(PREFER_KEY, direct ? '1' : '0');
    player.log(`字节来源 → ${direct ? '直连远程存储' : '经 Emby 服务器'}`);
    armResume(at);
    await load(sources());
  } finally { switching = false; paintMenu(); }
}

async function switchLine(to) {
  if (!EM || switching || !to || to === line) return;
  switching = true;
  const at = video.currentTime;
  try {
    WANT.url = reline(WANT.url, line, to);
    if (WANT.suburl) WANT.suburl = reline(WANT.suburl, line, to);
    line = EM.useLine(to);
    player.log(`切换线路 → ${LINES.find(l => l.url === to)?.name || to}`);
    armResume(at);
    await load(sources());
  } finally { switching = false; }
}

// ---- Emby session lifecycle: start / progress / stopped -----------------
// Wiring the two calls that emby.html defined but never made. Now the server
// learns the playhead as it moves, so "continue watching" and cross-device
// resume actually reflect this session. All best-effort; a failed report never
// touches playback (the client swallows errors).
let reported = false;
function reportStart() {
  if (reported || !EM || !WANT.id) return;
  reported = true;
  EM.reportStart(WANT.id, srcRef, WANT.ps);
}
const flushProgress = () => { if (EM && WANT.id) EM.reportProgress(WANT.id, srcRef, WANT.ps, video.currentTime, video.paused); };
video.addEventListener('playing', reportStart);
video.addEventListener('play', () => { reportStart(); flushProgress(); });
video.addEventListener('pause', flushProgress);
video.addEventListener('seeked', flushProgress);
// Emby's own web client reports every ~10s; matching that keeps the timeline
// fresh without hammering the server.
setInterval(() => { if (!video.paused) flushProgress(); }, 10000);

let stopped = false;
function reportStopped() {
  if (stopped || !EM || !WANT.id) return;
  stopped = true;
  EM.reportStopped(WANT.id, srcRef, WANT.ps, video.currentTime);
}
video.addEventListener('ended', reportStopped);
// pagehide covers navigation, tab close and back-button; more reliable than
// unload, which does not fire on mobile.
addEventListener('pagehide', reportStopped);

// ---- in-frame controls (same as index.html) -----------------------------
const vctl = $('#vctl'), seek = $('#seek');
const clock = s => {
  if (!Number.isFinite(s) || s < 0) s = 0;
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = Math.floor(s % 60);
  return h ? `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}` : `${m}:${String(sec).padStart(2, '0')}`;
};
function paintProgress() {
  const d = video.duration;
  if (!Number.isFinite(d) || d <= 0) return;
  $('#seekFill').style.width = `${(video.currentTime / d) * 100}%`;
  const b = video.buffered;
  let end = 0;
  for (let i = 0; i < b.length; i++) if (video.currentTime >= b.start(i) - 0.5 && video.currentTime <= b.end(i)) end = b.end(i);
  $('#seekBuf').style.width = `${Math.min(100, (end / d) * 100)}%`;
  $('#tNow').textContent = clock(video.currentTime);
  $('#tEnd').textContent = clock(d);
  seek.setAttribute('aria-valuenow', String(Math.round(video.currentTime)));
  seek.setAttribute('aria-valuemax', String(Math.round(d)));
  seek.setAttribute('aria-valuetext', `${clock(video.currentTime)} / ${clock(d)}`);
}
// Back = one step up the history. emby.html's view chain (home → library →
// library detail → series detail) lives only in its DOM, not the URL, so it was
// frozen into bfcache when it did location.href to reach us; history.back()
// restores that exact view instead of fresh-loading emby.html back to the top.
// Fall back to the href only when there's nothing to pop (opened directly / new tab).
$('#backBtn').addEventListener('click', e => { if (history.length > 1) { e.preventDefault(); history.back(); } });
const togglePlay = () => video.paused ? video.play().catch(() => {}) : video.pause();
$('#ppBtn').addEventListener('click', togglePlay);
// Mouse only. On touch a tap has to reveal the controls first -- play/pause is
// the centre double-tap there (src/ui/touch.js), because a viewer who cannot
// see the bar has no other way to summon it.
video.addEventListener('click', e => { if (e.pointerType !== 'touch') togglePlay(); });
const ICON_PLAY = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 3 14 9-14 9z"/></svg>`, ICON_PAUSE = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
const ICON_VOL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4.7 6.4 9H3v6h3.4l4.6 4.3z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.7 5.3a9 9 0 0 1 0 13.4"/></svg>`, ICON_MUTE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4.7 6.4 9H3v6h3.4l4.6 4.3z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>`;
const ICON_FULL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`, ICON_EXIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`;
video.addEventListener('play', () => { $('#ppBtn').innerHTML = ICON_PAUSE; });
video.addEventListener('pause', () => { $('#ppBtn').innerHTML = ICON_PLAY; });
video.addEventListener('timeupdate', paintProgress);
video.addEventListener('progress', paintProgress);
video.addEventListener('loadedmetadata', () => { vctl.hidden = false; paintProgress(); });

const seekToClientX = x => {
  const r = seek.getBoundingClientRect();
  const d = video.duration;
  if (Number.isFinite(d) && d > 0) video.currentTime = Math.max(0, Math.min(d, ((x - r.left) / r.width) * d));
};
let scrubbing = false;
seek.addEventListener('pointerdown', e => { scrubbing = true; seek.setPointerCapture(e.pointerId); seekToClientX(e.clientX); });
seek.addEventListener('pointermove', e => { if (scrubbing) seekToClientX(e.clientX); });
seek.addEventListener('pointerup', e => { scrubbing = false; seek.releasePointerCapture(e.pointerId); });

$('#muteBtn').addEventListener('click', () => { video.muted = !video.muted; syncVolume(); });
$('#vol').addEventListener('input', e => { video.volume = Number(e.target.value); video.muted = video.volume === 0; syncVolume(); });
function syncVolume() {
  $('#muteBtn').innerHTML = video.muted || video.volume === 0 ? ICON_MUTE : ICON_VOL;
  $('#vol').value = String(video.muted ? 0 : video.volume);
}
video.addEventListener('volumechange', syncVolume);

const picks = $('#picks'), gear = $('#gearBtn');
const closeMenu = () => { picks.hidden = true; gear.setAttribute('aria-expanded', 'false'); menu.open = null; };
gear.addEventListener('click', e => {
  e.stopPropagation();
  const open = picks.hidden;
  picks.hidden = !open;
  gear.setAttribute('aria-expanded', String(open));
  // Always reopen on the root list, never on whichever panel was last seen.
  if (open) { menu.open = null; paintMenu(); wake(); }
});
document.addEventListener('click', e => {
  if (!picks.hidden && !picks.contains(e.target) && e.target !== gear) closeMenu();
});
document.addEventListener('keydown', e => {
  // Escape steps out of a panel first, and only then shuts the menu -- the
  // back arrow's keyboard twin.
  if (e.key !== 'Escape' || picks.hidden) return;
  if (menu.open) { menu.open = null; menu.render(); } else closeMenu();
});
const menuOpen = () => !picks.hidden;

// The stage goes fullscreen, not the <video> -- see src/ui/touch.js for why.
// Also asks for landscape on a phone.
const paintFs = () => { $('#fsBtn').innerHTML = fs.active() ? ICON_EXIT : ICON_FULL; };
const fs = fullscreen(stage, { log: (m, l) => player.log(m, l), onChange: paintFs });
$('#fsBtn').addEventListener('click', () => fs.toggle());

let idleTimer = null;
const wake = () => {
  stage.classList.remove('idle');
  clearTimeout(idleTimer);
  if (!video.paused && !menuOpen()) idleTimer = setTimeout(() => stage.classList.add('idle'), 3000);
};
stage.addEventListener('pointermove', e => { if (e.pointerType !== 'touch') wake(); });
stage.addEventListener('pointerleave', e => { if (e.pointerType !== 'touch' && !video.paused && !menuOpen()) stage.classList.add('idle'); });
video.addEventListener('pause', wake);
video.addEventListener('play', wake);
// Exported like `player` and `subs` below: the volume probe's verdict is not
// observable any other way, and tools/test-touch.mjs asserts on it.
window.touch = attachTouch(stage, video, { onWake: wake, onTogglePlay: togglePlay, log: (m, l) => player.log(m, l) });

addEventListener('keydown', e => {
  const t = e.target;
  if (t instanceof HTMLInputElement || t instanceof HTMLSelectElement || t instanceof HTMLTextAreaElement) return;
  const d = video.duration;
  switch (e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': e.preventDefault(); if (Number.isFinite(d)) video.currentTime = Math.min(d, video.currentTime + 5); break;
    case 'ArrowLeft': e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 5); break;
    case 'ArrowUp': e.preventDefault(); video.volume = Math.min(1, video.volume + 0.05); break;
    case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume - 0.05); break;
    case 'm': video.muted = !video.muted; break;
    case 'f': $('#fsBtn').click(); break;
    default: return;
  }
  wake();
});
syncVolume();

video.addEventListener('error', () => {
  const e = video.error;
  if (e) player.log(`<video> 错误 ${e.code}: ${e.message || '(无信息)'}`, 'error');
});

// ---- go ------------------------------------------------------------------
if (WANT.url) load(sources());
else { $('#phText').textContent = '缺少播放地址，请从媒体库重新进入。'; }

window.player = player;
window.subs = subs;
</script>
