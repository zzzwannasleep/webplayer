<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>webplayer</title>
<style>
  :root { color-scheme: dark; --bg:#0b0d10; --panel:#14181d; --line:#242a31; --fg:#e6e9ec; --dim:#8b949e; --acc:#4a9eff; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,"Segoe UI",sans-serif; }
  header { padding:10px 16px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.02em; }
  main { display:grid; grid-template-columns:1fr 340px; gap:16px; padding:16px; align-items:start; }
  @media (max-width:900px){ main{grid-template-columns:1fr} }
  #stage { position:relative; background:#000; border-radius:6px; overflow:hidden; aspect-ratio:16/9; }
  video { width:100%; height:100%; display:block; background:#000; }
  /* Both subtitle renderers append their own canvas next to the video. They
     must not sit below it, resize the layout, or swallow clicks on the
     controls underneath. */
  #stage canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  aside { display:flex; flex-direction:column; gap:12px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:12px; }
  .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin:0 0 8px; font-weight:600; }
  button, select, input[type=file]::file-selector-button {
    background:#1d232a; color:var(--fg); border:1px solid var(--line); border-radius:4px;
    padding:6px 12px; font:inherit; cursor:pointer;
  }
  button:hover { border-color:var(--acc); }
  button:disabled { opacity:.4; cursor:default; }
  select { width:100%; margin-bottom:6px; }
  input[type=file] { color:var(--dim); font-size:13px; }
  .kv { display:grid; grid-template-columns:auto 1fr; gap:2px 10px; font-size:13px; }
  .kv dt { color:var(--dim); }
  .kv dd { margin:0; font-variant-numeric:tabular-nums; }
  .badge { display:inline-block; padding:1px 7px; border-radius:3px; font-size:11px; font-weight:600; letter-spacing:.03em; }
  .b-hdr { background:#1a3a2a; color:#5fd68a; } .b-dv { background:#3a2a1a; color:#f0b429; }
  .b-warn{ background:#3a1a1a; color:#ff7b72; } .b-ok { background:#1a2a3a; color:#6cb6ff; }
  #log { font:11px/1.45 ui-monospace,Consolas,monospace; max-height:170px; overflow:auto; white-space:pre-wrap; color:var(--dim); }
  #log .error { color:#ff7b72; } #log .warn { color:#f0b429; }
  .empty { color:var(--dim); font-size:13px; }
</style>

<header>
  <h1>webplayer</h1>
  <input type="file" id="file" accept=".mkv,.webm,.mp4">
  <span class="empty">or</span>
  <button id="loadHoushi">houshi.mkv (4K DV)</button>
  <button id="loadAss">ASS 特效</button>
  <button id="loadPgs">PGS</button>
  <span class="empty">·</span>
  <label class="empty" style="font-size:13px">外挂字幕 <input type="file" id="extSub" accept=".srt,.vtt,.ass,.ssa"></label>
</header>

<main>
  <div id="stage"><video id="video" controls playsinline></video></div>
  <aside>
    <div class="card">
      <h2>Source</h2>
      <div id="meta" class="empty">no file loaded</div>
    </div>
    <div class="card">
      <h2>Tracks</h2>
      <div id="tracks" class="empty">—</div>
      <button id="playBtn" disabled style="width:100%;margin-top:8px">Play</button>
    </div>
    <div class="card">
      <h2>Log</h2>
      <div id="log"></div>
    </div>
  </aside>
</main>

<script type="module">
import { Player } from '../src/player.js';
import { Subtitles, attachSrt } from '../src/subs/index.js';

const $ = s => document.querySelector(s);
const video = $('#video');
const player = new Player(video);
const subs = new Subtitles(player, { log: (m, l) => player.log(m, l) });

const logEl = $('#log');
player.log = (msg, level = 'info') => {
  const line = document.createElement('div');
  line.className = level;
  line.textContent = `${new Date().toLocaleTimeString('en-GB')}  ${msg}`;
  logEl.append(line);
  logEl.scrollTop = logEl.scrollHeight;
};

const fmtBytes = n => n > 1e9 ? `${(n / 2 ** 30).toFixed(2)} GB` : `${(n / 2 ** 20).toFixed(1)} MB`;
const fmtTime = s => {
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = Math.floor(s % 60);
  return h ? `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}` : `${m}:${String(sec).padStart(2, '0')}`;
};

let info = null;

async function load(input) {
  $('#playBtn').disabled = true;
  $('#meta').textContent = 'reading…';
  try {
    const t0 = performance.now();
    info = await player.load(input);
    player.log(`parsed header in ${(performance.now() - t0).toFixed(0)}ms`);
    render();
  } catch (e) {
    $('#meta').innerHTML = `<span class="badge b-warn">error</span> ${e.message}`;
    player.log(e.message, 'error');
    console.error(e);
  }
}

function render() {
  const badges = [];
  if (info.hdr) badges.push(`<span class="badge b-hdr">HDR ${info.hdr.transfer}</span>`);
  if (info.dolbyVision) {
    badges.push(`<span class="badge ${info.dolbyVision.playable ? 'b-dv' : 'b-warn'}">Dolby Vision P${info.dolbyVision.profile}</span>`);
  }
  $('#meta').innerHTML = `
    <div style="margin-bottom:8px">${badges.join(' ') || '<span class="badge b-ok">SDR</span>'}</div>
    <dl class="kv">
      <dt>file</dt><dd style="word-break:break-all">${info.name}</dd>
      <dt>size</dt><dd>${fmtBytes(info.size)}</dd>
      <dt>duration</dt><dd>${fmtTime(info.duration)}</dd>
      ${info.hdr ? `<dt>colour</dt><dd>${info.hdr.primaries} · ${info.hdr.bitDepth}-bit</dd>` : ''}
      <dt>fonts</dt><dd>${info.fonts} embedded</dd>
    </dl>
    ${info.dolbyVision ? `<div style="margin-top:8px;font-size:12px;color:var(--dim)">${info.dolbyVision.note}</div>` : ''}`;

  const sel = (id, items, fmt) => items.length
    ? `<select id="${id}">${items.map((x, i) => `<option value="${i}">${fmt(x)}</option>`).join('')}</select>`
    : `<div class="empty" style="margin-bottom:6px">no ${id} track</div>`;

  $('#tracks').innerHTML =
    sel('videoSel', info.video, x => `${x.label}${x.supported ? '' : '  ✕ unsupported'}`) +
    sel('audioSel', info.audio, x => `${x.label}${x.supported ? '' : '  ✕ unsupported'}`) +
    (info.subtitles.length
      ? `<select id="subSel"><option value="-1">subtitles: off</option>${
          info.subtitles.map((x, i) => {
            const ok = Subtitles.SUPPORTED.has(x.format);
            return `<option value="${i}"${ok ? '' : ' disabled'}>${x.label}${ok ? '' : '  ✕ no renderer'}</option>`;
          }).join('')}</select>`
      : '<div class="empty">no subtitle track</div>');

  $('#subSel')?.addEventListener('change', async e => {
    const idx = Number(e.target.value);
    e.target.disabled = true;
    try { await subs.select(idx); }
    catch (err) { player.log(`subtitles: ${err.message}`, 'error'); console.error(err); }
    finally { e.target.disabled = false; }
  });

  for (const a of info.audio) if (!a.supported) player.log(`audio ${a.label}: ${a.mime} rejected by MSE`, 'warn');
  $('#playBtn').disabled = !info.video.some(v => v.supported);
}

$('#playBtn').addEventListener('click', async () => {
  $('#playBtn').disabled = true;
  try {
    // A new play() rebuilds the MediaSource and restarts reading, so any
    // renderer from the previous run is holding events for a timeline that no
    // longer exists.
    await subs.destroy();
    if ($('#subSel')) $('#subSel').value = '-1';
    await player.play({
      videoIndex: Number($('#videoSel')?.value ?? 0),
      audioIndex: Number($('#audioSel')?.value ?? 0),
    });
    await video.play().catch(e => player.log(`autoplay blocked: ${e.message}`, 'warn'));
  } catch (e) {
    player.log(e.message, 'error');
    console.error(e);
  } finally {
    $('#playBtn').disabled = false;
  }
});

$('#file').addEventListener('change', e => { if (e.target.files[0]) load(e.target.files[0]); });

// External subtitle file. SRT and VTT go to the browser's own text track
// renderer; there is nothing to gain from drawing those ourselves.
let extTrack = null;
$('#extSub').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  extTrack?.remove();
  extTrack = null;
  try {
    const text = await file.text();
    if (/\.(ass|ssa)$/i.test(file.name)) {
      // Not wired up: an external ASS script needs its fonts from the system
      // rather than the MKV, which is a different problem from the embedded
      // case and is not solved by pretending it loaded.
      player.log('external ASS is not supported yet — only embedded ASS tracks', 'warn');
      return;
    }
    extTrack = attachSrt(video, text, { label: file.name, language: 'und' });
    player.log(`external subtitles: ${file.name} (${extTrack.track.cues?.length ?? '…'} cues)`);
  } catch (err) {
    player.log(`external subtitles: ${err.message}`, 'error');
  }
});
$('#loadHoushi').addEventListener('click', () => load('/houshi.mkv'));
$('#loadAss').addEventListener('click', () => load('/mozahngtantexiaoass.mkv'));
$('#loadPgs').addEventListener('click', () => load('/qinyinshaonvpgs.mkv'));

video.addEventListener('error', () => {
  const e = video.error;
  if (e) player.log(`<video> error ${e.code}: ${e.message || '(no message)'}`, 'error');
});
window.player = player;
</script>
