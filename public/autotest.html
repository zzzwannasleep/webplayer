<!doctype html>
<meta charset="utf-8">
<title>autotest</title>
<style>body{font:12px/1.5 ui-monospace,Consolas,monospace;background:#111;color:#ddd;padding:12px}
video{width:420px;background:#000}pre{white-space:pre-wrap}</style>
<video id="v" muted playsinline></video>
<pre id="out">running…</pre>
<script type="module">
// Headful acceptance test. Headless Chromium has no platform HEVC decoder, so
// the only meaningful run is in a real window -- results are POSTed back to
// the dev server for the shell to read.
import { Player } from '../src/player.js';
import { Subtitles } from '../src/subs/index.js';
import { srtToVtt } from '../src/subs/srt.js';

const out = document.getElementById('out');
const lines = [];
let failures = 0;
// Post after every file (and on any error) so a hang or a crash still leaves
// evidence behind instead of an empty timeout.
const post = () => fetch('/collect', { method: 'POST', body: out.textContent }).catch(() => {});
let postTimer = null;
const say = s => {
  lines.push(s);
  out.textContent = lines.join('\n');
  if (!postTimer) postTimer = setTimeout(() => { postTimer = null; post(); }, 250);
};
addEventListener('error', e => { say(`  FATAL ${e.message} @ ${e.filename}:${e.lineno}`); post(); });
addEventListener('unhandledrejection', e => { say(`  FATAL unhandled rejection: ${e.reason?.message ?? e.reason}`); post(); });
say('booted');
post();
const check = (label, actual, expected) => {
  const ok = actual === expected;
  if (!ok) failures++;
  say(`  ${ok ? 'PASS' : 'FAIL'}  ${label}: ${actual}${ok ? '' : `  (expected ${expected})`}`);
};

const FILES = [
  { url: '/mozahngtantexiaoass.mkv', w: 1920, h: 1080, hdr: false, dv: false, fonts: 28, subs: 2, audioOk: true,  audio: 'AAC',   sub: 'ass' },
  { url: '/qinyinshaonvpgs.mkv',     w: 1920, h: 1080, hdr: false, dv: false, fonts: 0,  subs: 3, audioOk: true,  audio: 'FLAC',  sub: 'pgs' },
  { url: '/houshi.mkv',              w: 3840, h: 2160, hdr: true,  dv: true,  fonts: 0,  subs: 4, audioOk: false, audio: 'E-AC3', sub: 'pgs', transcoded: true,
    hdr10plus: true, peakNits: 1000, maxCLL: 329, maxFALL: 142 },
];

/**
 * Count non-transparent pixels a renderer actually painted.
 *
 * Both renderers draw into a canvas whose control is transferred to a worker,
 * so getContext('2d') on it throws. Drawing the placeholder canvas into a
 * scratch canvas is the only way to read what the worker committed -- and it
 * is the whole point of the test: "no exception was thrown" is not evidence
 * that a subtitle appeared on screen.
 */
function paintedPixels(canvas) {
  if (!canvas?.width || !canvas?.height) return { ok: false, why: 'no canvas' };
  const scratch = document.createElement('canvas');
  const scale = Math.min(1, 640 / canvas.width);
  scratch.width = Math.max(1, Math.round(canvas.width * scale));
  scratch.height = Math.max(1, Math.round(canvas.height * scale));
  const ctx = scratch.getContext('2d', { willReadFrequently: true });
  try {
    ctx.drawImage(canvas, 0, 0, scratch.width, scratch.height);
    const px = ctx.getImageData(0, 0, scratch.width, scratch.height).data;
    let opaque = 0;
    for (let i = 3; i < px.length; i += 4) if (px[i] > 16) opaque++;
    return { ok: true, opaque, w: canvas.width, h: canvas.height };
  } catch (e) {
    return { ok: false, why: e.message, w: canvas.width, h: canvas.height };
  }
}

/** The canvas a renderer created next to the video. */
const rendererCanvas = video => [...(video.parentNode?.querySelectorAll('canvas') ?? [])].pop();

/**
 * Brightness of the DECODED PICTURE, read off the element itself.
 *
 * This exists because "subtitles are painted" and "the film is still visible"
 * are different claims, and this suite only ever asserted the first. It passed
 * a build where turning on ASS left nothing on screen but the subtitles.
 */
function picture(video) {
  const c = document.createElement('canvas');
  c.width = 160; c.height = 90;
  const g = c.getContext('2d', { willReadFrequently: true });
  try { g.drawImage(video, 0, 0, 160, 90); } catch (e) { return { ok: false, why: e.message }; }
  const d = g.getImageData(0, 0, 160, 90).data;
  let sum = 0, lit = 0;
  for (let i = 0; i < d.length; i += 4) {
    const y = (d[i] * 299 + d[i + 1] * 587 + d[i + 2] * 114) / 1000;
    sum += y; if (y > 12) lit++;
  }
  return { ok: true, meanY: +(sum / 14400).toFixed(1), litPct: +(100 * lit / 14400).toFixed(1) };
}

/** How much of the subtitle overlay is opaque. 100% means it hides the film. */
function coverage(video) {
  const canvas = rendererCanvas(video);
  if (!canvas?.width) return { ok: false, why: 'no overlay canvas' };
  const s = document.createElement('canvas');
  const scale = Math.min(1, 480 / canvas.width);
  s.width = Math.max(1, Math.round(canvas.width * scale));
  s.height = Math.max(1, Math.round(canvas.height * scale));
  const g = s.getContext('2d', { willReadFrequently: true });
  try { g.drawImage(canvas, 0, 0, s.width, s.height); } catch (e) { return { ok: false, why: e.message }; }
  const px = g.getImageData(0, 0, s.width, s.height).data;
  let opaque = 0;
  for (let i = 3; i < px.length; i += 4) if (px[i] > 16) opaque++;
  return { ok: true, pct: +(100 * opaque / (s.width * s.height)).toFixed(2) };
}

/** Poll until the renderer has painted something, or give up. */
async function waitForPaint(video, ms) {
  const t0 = performance.now();
  let best = { ok: false, opaque: 0 };
  while (performance.now() - t0 < ms) {
    const r = paintedPixels(rendererCanvas(video));
    if (r.ok && r.opaque > 0) return r;
    if (r.ok) best = r;
    else best = r;
    await new Promise(r2 => setTimeout(r2, 250));
  }
  return best;
}

const waitFor = (cond, ms, label) => new Promise((res, rej) => {
  const t0 = performance.now();
  const tick = () => {
    if (cond()) return res(performance.now() - t0);
    if (performance.now() - t0 > ms) return rej(new Error(`timeout waiting for ${label}`));
    requestAnimationFrame(tick);
  };
  tick();
});

const video = document.getElementById('v');

for (const f of FILES) {
  say(`\n=== ${f.url} ===`);
  const player = new Player(video);
  player.log = (m, lvl) => say(`       [${lvl ?? 'info'}] ${m}`);
  let subs = null;
  try {
    const t0 = performance.now();
    say('  step: HEAD + parseHeader…');
    const info = await player.load(f.url);
    say(`  header parsed in ${(performance.now() - t0).toFixed(0)}ms`);

    check('video track playable via MSE', info.video[0]?.supported, true);
    say(`       mime: ${info.video[0]?.mime}`);
    check('subtitle track count', info.subtitles.length, f.subs);
    check('embedded fonts', info.fonts, f.fonts);
    check('HDR detected', !!info.hdr, f.hdr);
    check('HDR10+ detected', info.hdr10plus, !!f.hdr10plus);
    check('HDR Vivid detected', info.hdrVivid, !!f.hdrVivid);
    if (f.hdr) {
      // Static HDR metadata comes from SEI, not the container, and is what a
      // display uses to tone-map. Missing it is silent -- the picture is just
      // graded wrong -- so the exact values are asserted.
      check('mastering display recovered from SEI', !!info.mastering, true);
      check('mastering peak luminance (nits)', info.mastering && info.mastering.maxLuminance / 10000, f.peakNits);
      check('MaxCLL', info.cll?.maxCLL, f.maxCLL);
      check('MaxFALL', info.cll?.maxFALL, f.maxFALL);
    }
    check('Dolby Vision detected', !!info.dolbyVision, f.dv);
    if (info.dolbyVision) {
      check('DV single layer (playable as HDR10)', info.dolbyVision.playable, true);
      say(`       DV profile ${info.dolbyVision.profile}`);
    }
    check(`${f.audio} audio accepted by MSE`, info.audio[0]?.supported, f.audioOk);
    if (f.transcoded) say('  (E-AC3 will be decoded in wasm and re-encoded to Opus)');

    // --- the real test: does it actually decode and advance? --------------
    subs = new Subtitles(player, { log: (m, lvl) => say(`       [sub:${lvl ?? 'info'}] ${m}`) });
    await player.play({ videoIndex: 0, audioIndex: 0 });
    await waitFor(() => video.readyState >= 2, 25000, 'readyState>=HAVE_CURRENT_DATA');
    check('videoWidth from decoder', video.videoWidth, f.w);
    check('videoHeight from decoder', video.videoHeight, f.h);

    await video.play();
    const startT = video.currentTime;
    await waitFor(() => video.currentTime > startT + 1.5, 20000, 'playback to advance 1.5s');
    check('currentTime advanced past 1.5s', video.currentTime > 1.5, true);
    say(`       playing at t=${video.currentTime.toFixed(2)}s, buffered=${video.buffered.length ? video.buffered.end(0).toFixed(1) : 0}s`);

    // --- seek into the middle and confirm it resumes ----------------------
    const target = Math.min(info.duration * 0.5, 600);
    video.currentTime = target;
    await waitFor(() => video.readyState >= 2 && Math.abs(video.currentTime - target) < 20, 30000, 'seek to complete');
    const afterSeek = video.currentTime;
    await waitFor(() => video.currentTime > afterSeek + 0.5, 20000, 'playback after seek');
    check(`seek to ${target.toFixed(0)}s resumed`, video.currentTime > target - 20, true);
    say(`       resumed at t=${video.currentTime.toFixed(2)}s`);

    // Software-decoded audio: the only claim worth checking is that real audio
    // data reached a SourceBuffer, not that no exception was thrown.
    if (f.transcoded) {
      await waitFor(() => player.transcoder?.encodedChunks > 0, 90000,
                    'wasm decode + Opus encode to produce chunks')
        .catch(e => { failures++; say(`  FAIL  ${e.message}`); });
      check('transcoder produced Opus chunks', player.transcoder?.encodedChunks > 0, true);
      const ab = player.transcoder?.sb?.buffered;
      const secs = ab?.length ? ab.end(ab.length - 1) - ab.start(0) : 0;
      say(`       ${player.transcoder?.encodedChunks} Opus chunks, ${secs.toFixed(1)}s buffered`);
      check('transcoded audio reached the SourceBuffer', secs > 1, true);
    }

    // --- subtitles --------------------------------------------------------
    // Turned on after the seek on purpose: the PGS tracks in these files have
    // no packets in the first seconds, so enabling at t=0 would test nothing
    // until the buffer reached the first subtitle anyway.
    say(`  step: subtitles (${f.sub})…`);
    const track = info.subtitles.findIndex(s => s.format === f.sub);
    check(`found a ${f.sub} track`, track >= 0, true);
    const started = await subs.select(track);
    check('renderer started', !!started, true);
    if (f.sub === 'ass') check('embedded fonts handed to libass', started?.fonts, f.fonts);

    // Packets only arrive as the player reads ahead, so let it play.
    await waitFor(() => subs.delivered > 0, 30000, 'subtitle packets to reach the renderer')
      .catch(e => { failures++; say(`  FAIL  ${e.message}`); });
    say(`       ${subs.delivered} subtitle${f.sub === 'ass' ? ' events' : ' display sets'} delivered`);
    check('renderer received subtitles', subs.delivered > 0, true);

    // The only claim that matters: did anything get painted?
    const paint = await waitForPaint(video, 20000);
    if (paint.ok) {
      say(`       overlay canvas ${paint.w}x${paint.h}, ${paint.opaque} opaque px sampled`);
      check('subtitle pixels painted on the overlay', paint.opaque > 0, true);
    } else {
      // Not a pass. If the canvas cannot be read back, this test cannot prove
      // anything about what is on screen, and that must not read as success.
      failures++;
      say(`  FAIL  could not read the overlay canvas: ${paint.why}`);
    }

    video.pause();
    await subs.destroy();
    await player.dispose();   // shared <video>: a stale player keeps handling its events
  } catch (e) {
    failures++;
    say(`  FAIL  ${e.message}`);
    console.error(e);
    try { await subs?.destroy(); } catch {}
    try { await player.dispose(); } catch {}
  }
  post();
}

// --- external SRT: no renderer of ours, the browser draws it ---------------
say('\n=== houshisrt.srt (native <track>) ===');
try {
  const srt = await (await fetch('/houshisrt.srt')).text();
  const vtt = srtToVtt(srt);
  const cues = (vtt.match(/-->/g) ?? []).length;
  check('cues converted', cues > 1000, true);
  say(`       ${cues} cues`);

  const el = document.createElement('track');
  el.kind = 'subtitles';
  el.src = URL.createObjectURL(new Blob([vtt], { type: 'text/vtt' }));
  video.appendChild(el);
  el.track.mode = 'showing';
  // Wait for the element's load event, not for the first cue to appear:
  // cues populate progressively, so checking the count as soon as one exists
  // races the parser and yields a number one or two short at random.
  await Promise.race([
    new Promise(res => el.addEventListener('load', res, { once: true })),
    waitFor(() => el.track.cues?.length >= cues, 15000, 'the browser to parse the VTT'),
  ]);
  check('browser parsed the cues', el.track.cues.length, cues);
  // The browser rejects a malformed cue silently by dropping it, so an exact
  // match is the check -- not merely "some cues loaded".
  say(`       first cue "${el.track.cues[0].text.slice(0, 40)}" at ${el.track.cues[0].startTime.toFixed(3)}s`);
  check('first cue time', el.track.cues[0].startTime.toFixed(3), '4.420');
  el.remove();
} catch (e) {
  failures++;
  say(`  FAIL  ${e.message}`);
}
post();

// --- codec paths that were only ever claimed, never played -----------------
// The three files above are all HEVC. AVC, AV1 and VP9 have sample-entry code
// and a README claim, but until these samples existed no browser had been
// asked to accept one. A codec string is not right because it parses -- it is
// right when MSE takes it and the decoder produces a picture.
say('\n=== generated codec samples ===');
const CODEC_SAMPLES = [
  { url: '/samples/video-avc.mkv',       codec: 'avc1.42c01e' },
  { url: '/samples/video-av1.mkv',       codec: 'av01.0.01M.08' },
  { url: '/samples/video-vp9.mkv',       codec: 'vp09.00.21.08' },
  { url: '/samples/video-vp9-10bit.mkv', codec: 'vp09.02.21.10' },
  { url: '/samples/audio-multi.mkv',     codec: 'hvc1.1.6.L63.90', audioUnplayable: 4 },
];
for (const s of CODEC_SAMPLES) {
  const p = new Player(video);
  p.log = (m, lvl) => say(`       [${lvl ?? 'info'}] ${m}`);
  // play() can wait indefinitely by design when the document is hidden, so a
  // hang here says nothing about the codec. Race it and dump the state, rather
  // than letting the whole suite time out with no evidence.
  const guard = (promise, ms, what) => Promise.race([promise, new Promise((_, rej) =>
    setTimeout(() => rej(new Error(`${what} stalled after ${ms}ms — hidden=${document.hidden} `
      + `ms=${p.mediaSource?.readyState} net=${video.networkState} ready=${video.readyState} `
      + `err=${video.error?.code ?? 'none'} buffered=${video.buffered.length}`)), ms))]);
  try {
    const i = await guard(p.load(s.url), 30000, 'load');
    const mime = i.video[0]?.mime ?? '';
    say(`  ${s.url.split('/').pop()}  ${mime}`);
    check('  codec string as expected', mime.match(/codecs="([^"]+)"/)?.[1], s.codec);
    check('  MSE accepts it', i.video[0]?.supported, true);
    if (s.audioUnplayable) {
      // Every one of these needs a software decoder; none may claim otherwise.
      check('  audio tracks all reported unplayable', i.audio.filter(a => !a.supported).length, s.audioUnplayable);
      check('  each names its codec', i.audio.every(a => a.note?.name), true);
    }
    await guard(p.play({ videoIndex: 0, audioIndex: 0 }), 30000, 'play');
    await waitFor(() => video.readyState >= 2, 20000, `${s.url} to decode`);
    check('  decoder reports a picture', video.videoWidth > 0 && video.videoHeight > 0, true);
    say(`       ${video.videoWidth}x${video.videoHeight}`);
    await video.play();
    await waitFor(() => video.currentTime > 0.4, 15000, `${s.url} to advance`);
    check('  playback advances', video.currentTime > 0.4, true);
    video.pause();
  } catch (e) {
    failures++;
    say(`  FAIL  ${s.url}: ${e.message}`);
  }
  await p.dispose();
}
post();

// --- drive the real UI, the way a person does ------------------------------
//
// Everything above drives the modules directly. Every UI bug found so far was
// invisible to that: the vendor bundles 404'd when the page was opened from
// '/', and pressing play silently switched the chosen subtitle back off. Both
// were reachable only by clicking, so this clicks.
say('\n=== player UI, driven by clicking ===');
try {
  const frame = document.createElement('iframe');
  frame.style.cssText = 'width:1100px;height:660px;border:1px solid #333';
  const errors = [];
  const loaded = new Promise(res => { frame.onload = res; });
  document.body.append(frame);
  // The address a person is told to open, redirect and all -- not the direct
  // path to index.html, which is exactly what hid the vendor 404s.
  frame.src = '/';
  await loaded;
  const w = frame.contentWindow;
  w.addEventListener('error', e => errors.push(e.message));
  w.addEventListener('unhandledrejection', e => errors.push(String(e.reason?.message ?? e.reason)));
  // '/' 302s to '/public/'. onload can fire for the document that then gets
  // replaced, so the document has to be re-read after the page is really up --
  // otherwise every getElementById returns null and the failure reads like the
  // page is broken rather than like the harness looked at the wrong document.
  await waitFor(() => w.player && frame.contentDocument.getElementById('url'), 20000, 'the page to boot');
  const d = frame.contentDocument;
  check('page booted', !!w.player, true);
  check('served from /public/ so relative URLs resolve', d.baseURI.endsWith('/public/'), true);

  // Vendor bundles have to be reachable FROM THE PAGE, not from wherever the
  // test happens to live.
  for (const f of ['jassub.js', 'libpgs.js', 'jassub-worker.wasm']) {
    const r = await w.fetch(new URL('vendor/' + f, d.baseURI)).catch(() => null);
    check(`vendor/${f} reachable from the page`, r?.ok === true, true);
  }

  // Load the way a person does now that the sample shortcuts are gone: paste a
  // URL and press the button.
  const urlBox = d.getElementById('url');
  check('URL box present in the header', !!urlBox, true);
  urlBox.value = '/mozahngtantexiaoass.mkv';
  d.getElementById('loadUrl').click();
  await waitFor(() => d.getElementById('subSel'), 40000, 'tracks to appear after load');
  // Track pickers live behind the gear now, so opening it is part of the path.
  const gear = d.getElementById('gearBtn'), menu = d.getElementById('picks');
  check('track menu starts closed', menu.hidden, true);
  gear.click();
  check('gear opens the track menu', menu.hidden, false);
  check('subtitle picker present', !!d.getElementById('subSel'), true);
  check('audio picker present', !!d.getElementById('audioSel'), true);
  check('video picker present', !!d.getElementById('videoSel'), true);
  check('menu reports expanded to assistive tech', gear.getAttribute('aria-expanded'), 'true');

  // Loading now starts playback on its own; there is no button outside the frame.
  const fv = d.getElementById('video');
  await waitFor(() => fv.readyState >= 2, 40000, 'the UI to decode a frame');
  check('decoder produced a picture', fv.videoWidth > 0, true);
  // readyState only says a frame is decodable. Whether the element is actually
  // ADVANCING is a separate fact, and asserting the first while meaning the
  // second is what made this block flaky.
  await waitFor(() => !fv.paused && fv.currentTime > 0, 30000, 'playback to actually advance');
  check('playback advancing from the UI', !fv.paused && fv.currentTime > 0, true);

  // The native controls are gone, so everything they used to provide has to
  // be exercised rather than assumed present.
  check('in-frame controls visible once metadata arrives', d.getElementById('vctl').hidden, false);
  const pp = d.getElementById('ppBtn');
  // Icons are SVG now, so state is read from the accessible markup rather than
  // from a glyph that renders differently on every platform.
  const ppIcon = () => pp.querySelector('svg rect') ? 'pause' : 'play';
  check('play/pause icon shows the pause state', ppIcon(), 'pause');
  pp.click();
  await waitFor(() => fv.paused, 5000, 'pause via the custom button');
  check('custom pause button pauses', fv.paused, true);
  // video.paused flips synchronously but the 'pause' EVENT is a task, so
  // asserting the label straight after the click races the handler that
  // updates it. Wait for the label itself.
  await waitFor(() => ppIcon() === 'play', 5000, 'the icon to flip').catch(() => {});
  check('icon flipped to play', ppIcon(), 'play');
  pp.click();
  await waitFor(() => !fv.paused, 5000, 'resume');
  check('custom play button resumes', fv.paused, false);

  // Space is the one keyboard binding a viewer will try without thinking.
  w.dispatchEvent(new w.KeyboardEvent('keydown', { key: ' ', bubbles: true }));
  await waitFor(() => fv.paused, 5000, 'space to pause');
  check('space bar pauses', fv.paused, true);
  w.dispatchEvent(new w.KeyboardEvent('keydown', { key: ' ', bubbles: true }));
  await waitFor(() => !fv.paused, 5000, 'space to resume');

  // Arrow keys must not scroll the page instead of seeking.
  const before = fv.currentTime;
  w.dispatchEvent(new w.KeyboardEvent('keydown', { key: 'ArrowRight', bubbles: true }));
  await new Promise(r => setTimeout(r, 400));
  check('right arrow seeks forward', fv.currentTime > before, true);

  const w1 = d.getElementById('seekFill').style.width;
  check('progress bar has been painted', w1 !== '' && w1 !== '0%', true);
  check('fullscreen button present', !!d.getElementById('fsBtn'), true);
  // Every icon has to be one consistent set, not a mix of glyphs and SVG.
  const icons = [...d.querySelectorAll('#vctl .vbtn svg')];
  check('all control icons are SVG', icons.length >= 4, true);
  check('icons share one viewBox', new Set(icons.map(i => i.getAttribute('viewBox'))).size, 1);
  check('icons share one stroke width', new Set(icons.map(i => i.getAttribute('stroke-width'))).size, 1);
  check('seek bar has its own row', d.querySelector('#seek').getBoundingClientRect().top
        < d.querySelector('.vrow').getBoundingClientRect().top, true);

  const sel = d.getElementById('subSel');
  const opt = [...sel.options].find(o => !o.disabled && o.value !== '-1');
  check('an enabled subtitle option exists', !!opt, true);
  // Sampled before subtitles so the comparison is against this film, at this
  // moment -- an absolute brightness threshold would just be a guess about
  // how dark a given scene is allowed to be.
  const picBefore = picture(fv);
  say(`       picture before subtitles: meanY=${picBefore.meanY} lit=${picBefore.litPct}%`);
  sel.value = opt.value;
  sel.dispatchEvent(new w.Event('change'));

  // The claim is pixels on screen, not "no exception was thrown".
  const paint = await waitForPaint(fv, 45000);
  if (paint.ok) {
    say(`       overlay ${paint.w}x${paint.h}, ${paint.opaque} opaque px`);
    check('subtitle painted after selecting it in the UI', paint.opaque > 0, true);
  } else {
    failures++;
    say(`  FAIL  overlay unreadable: ${paint.why}`);
  }

  // Subtitles must not cost the picture. Both halves are asserted because they
  // fail differently: an overlay that paints the whole frame opaque, and a
  // video element that has stopped producing pixels at all.
  const cov = coverage(fv);
  const picAfter = picture(fv);
  say(`       overlay covers ${cov.pct}% of the frame; picture meanY=${picAfter.meanY} lit=${picAfter.litPct}%`);
  check('overlay does not blanket the frame', cov.ok && cov.pct < 60, true);
  check('picture still being decoded with subtitles on', picAfter.ok && picAfter.litPct > 20, true);
  check('picture not blacked out by the overlay', picAfter.meanY > 8, true);

  // Switching to the other subtitle track and back must keep drawing: each
  // switch tears one renderer down and builds another on a live MediaSource.
  const other = [...sel.options].find(o => !o.disabled && o.value !== '-1' && o.value !== opt.value);
  if (other) {
    sel.value = other.value;
    sel.dispatchEvent(new w.Event('change'));
    const paint2 = await waitForPaint(fv, 45000);
    check('second subtitle track also paints', paint2.ok && paint2.opaque > 0, true);
    sel.value = '-1';
    sel.dispatchEvent(new w.Event('change'));
    await new Promise(r => setTimeout(r, 1200));
    check('turning subtitles off is honoured', sel.value, '-1');
  }
  // Escape must close the menu; a panel that only closes via its own button
  // reads as stuck.
  d.dispatchEvent(new w.KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
  check('Escape closes the track menu', menu.hidden, true);
  if (false) {
  }

  check('no errors while driving the UI', errors.length, 0);
  if (errors.length) say(`       ${errors.join(' | ')}`);
  frame.remove();
} catch (e) {
  failures++;
  say(`  FAIL  ${e.message}`);
}
post();

say(`\n${failures === 0 ? 'ALL BROWSER CHECKS PASSED' : `${failures} CHECK(S) FAILED`}`);
say(`UA ${navigator.userAgent}`);
fetch('/collect', { method: 'POST', body: out.textContent }).catch(() => {});
document.title = 'DONE';
</script>
