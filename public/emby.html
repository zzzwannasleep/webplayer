<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LinWeb · Emby</title>
<!-- one icon: Edge/Chrome lighten a dark monochrome favicon themselves on a dark
     tab strip (verified on the real strip), so a media-switched white twin would
     only risk white-on-white where they do not. icon-white.png is for in-page use. -->
<link rel="icon" href="./icon.png">

<style>
  :root{
    color-scheme:dark;
    --ink:#0C0D10;--ink-2:#131418;--ink-3:#1B1D22;--line:#26282E;--line-2:#34373E;--bg-rgb:12,13,16;
    --fg:#ECEDF0;--fg-dim:#9A9DA6;--fg-mute:#626670;
    --accent:#FFFFFF;--accent-ink:#0C0D10;--good:#34C759;--hot:#FF6B7A;
    --hover:rgba(255,255,255,.05);--surface:rgba(255,255,255,.07);--surface-2:rgba(255,255,255,.12);--sel:rgba(255,255,255,.09);
    --ease:cubic-bezier(.34,1.4,.5,1);--ease-out:cubic-bezier(.2,.7,.3,1);
    --sans:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    /* The page gutter, in one place because eleven rules have to agree on it --
       the hero, every rail, every grid and both detail panes. The phone block
       at the bottom of this sheet is what it exists for. */
    --pad:48px;
  }
  :root[data-theme=light]{
    color-scheme:light;
    --ink:#F6F6F4;--ink-2:#FFFFFF;--ink-3:#FFFFFF;--line:#E6E6E2;--line-2:#D4D4CF;--bg-rgb:246,246,244;
    --fg:#17181B;--fg-dim:#585B62;--fg-mute:#8A8D94;--accent:#17181B;--accent-ink:#FFFFFF;--good:#1E9E4A;
    --hover:rgba(0,0,0,.04);--surface:rgba(0,0,0,.045);--surface-2:rgba(0,0,0,.08);--sel:rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme:light){:root:not([data-theme]){color-scheme:light;
    --ink:#F6F6F4;--ink-2:#FFFFFF;--ink-3:#FFFFFF;--line:#E6E6E2;--line-2:#D4D4CF;--bg-rgb:246,246,244;
    --fg:#17181B;--fg-dim:#585B62;--fg-mute:#8A8D94;--accent:#17181B;--accent-ink:#FFFFFF;--good:#1E9E4A;
    --hover:rgba(0,0,0,.04);--surface:rgba(0,0,0,.045);--surface-2:rgba(0,0,0,.08);--sel:rgba(0,0,0,.06);}}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ink);color:var(--fg);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
  .num{font-variant-numeric:tabular-nums}
  button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:9px}

  #app{display:grid;grid-template-columns:68px 1fr;height:100dvh}
  #app.hidden{display:none}
  #rail{background:linear-gradient(180deg,var(--ink-2),var(--ink));border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 0;z-index:40}
  .brand{width:38px;height:38px;border-radius:11px;margin-bottom:12px;background:linear-gradient(140deg,var(--ink-3),var(--ink-2));border:1px solid var(--line-2);display:grid;place-items:center;color:var(--fg);font-weight:800;cursor:pointer}
  /* The site icon is a black glyph: invert it on the dark chrome, leave it be on
     the light theme. Same two conditions the palette above switches on. */
  .brand img{width:22px;height:22px;object-fit:contain;filter:invert(1)}
  :root[data-theme=light] .brand img{filter:none}
  @media (prefers-color-scheme:light){:root:not([data-theme]) .brand img{filter:none}}
  .navbtn{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:var(--fg-mute);position:relative;transition:.25s var(--ease-out)}
  /* an explicit `display` beats the UA rule for [hidden], so hiding the admin
     button by attribute did nothing until this line existed */
  [hidden]{display:none!important}
  .navbtn svg{width:22px;height:22px}
  .navbtn:hover{color:var(--fg);background:var(--hover)}
  .navbtn.on{color:var(--accent)}
  .navbtn.on::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:3px;background:var(--accent)}
  .rail-sp{flex:1}
  /* The server's own icon and nothing else. Until one loads it is a plain flat
     target so the logout button is still findable; once it does, the chrome
     gets out of the way (.has-icon). */
  .avatar{position:relative;overflow:hidden;width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--line-2);margin-top:6px;cursor:pointer}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  .avatar.has-icon{background:none;border-color:transparent}

  #view{position:relative;overflow-y:auto;overflow-x:hidden}
  #topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:14px 32px;backdrop-filter:blur(14px);background:linear-gradient(180deg,rgba(var(--bg-rgb),.86),rgba(var(--bg-rgb),.3) 70%,transparent);transition:background .3s}
  #view.scrolled #topbar{background:rgba(var(--bg-rgb),.92);border-bottom:1px solid var(--line)}
  .crumbs{font-size:14px;color:var(--fg-dim);display:flex;align-items:center;gap:8px}
  .crumbs b{color:var(--fg);font-weight:700}
  .spacer{flex:1}
  .search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 14px;width:300px;transition:.2s}
  .search:hover,.search:focus-within{border-color:var(--line-2)}
  .search svg{width:16px;height:16px;opacity:.7}
  .search input{flex:1;min-width:0;background:none;border:0;outline:0;color:var(--fg);font-size:14px}
  .search input::placeholder{color:var(--fg-dim)}
  .pill{font-size:12px;color:var(--fg-dim);border:1px solid var(--line);border-radius:999px;padding:5px 12px;white-space:nowrap}

  .view-pane{display:none}.view-pane.on{display:block;animation:fadeUp .4s var(--ease-out)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* hero */
  #hero{position:relative;height:64vh;min-height:440px;display:flex;align-items:flex-end;padding:0 var(--pad) 40px;margin-top:-72px;overflow:hidden}
  #hero .bg{position:absolute;inset:0;z-index:-2;background-size:cover;background-position:center;transition:opacity .8s}
  #hero::after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(90deg,rgba(var(--bg-rgb),.92),rgba(var(--bg-rgb),.4) 45%,transparent 72%),linear-gradient(0deg,var(--ink) 4%,transparent 60%)}
  .hero-inner{max-width:620px}
  .hero-title{font-size:clamp(36px,5vw,64px);line-height:.98;font-weight:800;letter-spacing:-.02em;margin:0 0 14px;text-wrap:balance;text-shadow:0 2px 30px rgba(0,0,0,.4)}
  .hero-meta{display:flex;align-items:center;gap:12px;color:var(--fg-dim);font-size:14px;margin-bottom:14px;flex-wrap:wrap}
  .hero-desc{color:var(--fg-dim);line-height:1.6;font-size:15px;max-width:560px;margin-bottom:22px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}
  .btn{display:inline-flex;align-items:center;gap:9px;padding:12px 22px;border-radius:12px;font-weight:700;font-size:15px;transition:.2s var(--ease)}
  .btn svg{width:18px;height:18px}
  .btn.play{background:var(--accent);color:var(--accent-ink)}
  .btn.play:hover{transform:translateY(-2px)}
  .btn.ghost{background:var(--surface-2);color:var(--fg);border:1px solid var(--line)}
  .btn.ghost:hover{transform:translateY(-2px)}
  .btn.sm{padding:10px 16px;font-size:13px}
  .btn.icon{width:46px;height:46px;padding:0;border-radius:50%;justify-content:center}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap}

  /* rails */
  #rails{padding:8px 0 60px;margin-top:-30px;position:relative;z-index:2}
  .rail{margin:30px 0}
  .rail-head{display:flex;align-items:baseline;gap:12px;padding:0 var(--pad);margin-bottom:12px}
  .rail-head h2{font-size:19px;font-weight:700;margin:0}
  /* scroll-padding, not just padding: a `start`-aligned snap target lines up
     with the scrollport edge, so without this the first card in every rail
     snaps flush to the screen edge and eats its own gutter. */
  .track{display:flex;gap:16px;overflow-x:auto;overflow-y:hidden;padding:24px var(--pad) 28px;scroll-padding-left:var(--pad);margin:-16px 0;scroll-snap-type:x proximity}
  .track::-webkit-scrollbar{height:0}.track:hover::-webkit-scrollbar{height:6px}
  /* One width for the poster and the two lines of text under it, so a phone
     only has to override --pw. */
  .card{flex:0 0 auto;scroll-snap-align:start;cursor:pointer;transition:transform .3s var(--ease);--pw:150px}
  .card.land{--pw:300px}
  .poster{width:var(--pw);aspect-ratio:2/3;border-radius:14px;background-size:cover;background-position:center;position:relative;box-shadow:0 8px 24px -12px #000;border:1px solid var(--surface);overflow:hidden}
  .land .poster{width:var(--pw);aspect-ratio:16/9}
  /* Hover lifts are a mouse idiom: on touch the :hover state latches after a
     tap and the card stays raised until you tap something else. */
  @media (hover:hover){
    .card:hover{transform:translateY(-10px) scale(1.04);z-index:5}
    .card:hover .poster{box-shadow:0 26px 50px -16px #000c,0 0 0 1px var(--accent)}
  }
  .cmore{position:absolute;top:7px;right:7px;width:28px;height:28px;border-radius:9px;border:0;z-index:3;
          background:rgba(0,0,0,.62);color:#fff;display:grid;place-items:center;font-size:16px;line-height:1;
          cursor:pointer;opacity:0;transition:opacity .16s,background .16s;backdrop-filter:blur(6px)}
  .card:hover .cmore,.gcell:hover .cmore,.cmore:focus-visible{opacity:1}
  .cmore:hover{background:rgba(0,0,0,.88)}
  @media (hover:none){.cmore{opacity:1}}
  .pw{position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(0,0,0,.5)}
  .pw i{display:block;height:100%;background:var(--accent)}
  .ctitle{font-size:13px;font-weight:600;margin-top:9px;width:var(--pw);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .csub{font-size:12px;color:var(--fg-mute);margin-top:2px}

  /* library cards + grid */
  .page-head{padding:32px var(--pad) 0;display:flex;align-items:center;gap:20px}
  .page-title{font-size:32px;font-weight:800;letter-spacing:-.02em;margin:0}
  .page-title .cnt{font-size:15px;color:var(--fg-mute);font-weight:500;margin-left:10px}
  .backbtn{font-size:14px;font-weight:600;color:var(--fg-dim);padding:8px 12px;border-radius:10px}
  .backbtn:hover{color:var(--fg);background:var(--hover)}
  .libcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding:24px var(--pad) 80px}
  .libcard{position:relative;aspect-ratio:16/9;border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid var(--line);background-size:cover;background-position:center;transition:transform .3s var(--ease)}
  @media (hover:hover){.libcard:hover{transform:translateY(-6px) scale(1.015);border-color:var(--line-2)}}
  .libcard::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.82),rgba(0,0,0,.1) 55%,rgba(0,0,0,.4))}
  .libcard .lx{position:absolute;left:18px;right:18px;bottom:15px;z-index:2}
  .libcard .ln{font-size:22px;font-weight:800;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.6)}
  .libcard .lc{font-size:13px;color:rgba(255,255,255,.82);margin-top:3px}
  .chips{display:flex;gap:9px;overflow-x:auto;padding:14px var(--pad) 4px}.chips::-webkit-scrollbar{height:0}
  .gchip{flex:0 0 auto;font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--fg-dim);cursor:pointer;transition:.2s;white-space:nowrap}
  .gchip:hover{color:var(--fg)}.gchip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--gmin,160px),1fr));gap:22px 18px;padding:22px var(--pad) 28px}
  #searchGrid{padding-bottom:70px}
  .libmore{min-height:20px;padding:0 var(--pad) 70px;display:flex;justify-content:center}
  .libmore .sp{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--line-2);border-top-color:var(--fg-dim);animation:spin .7s linear infinite;margin:14px 0}
  .libmore .end{color:var(--fg-mute);font-size:12.5px;padding:12px 0}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* library toolbar: sort / filter / density, top-right of the page head */
  .libtools{margin-left:auto;display:flex;gap:8px;align-items:center;flex:0 0 auto}
  .tbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--fg-dim);padding:8px 13px;border-radius:10px;border:1px solid var(--line);background:var(--surface);transition:.2s;white-space:nowrap}
  .tbtn:hover{color:var(--fg);border-color:var(--line-2)}
  .tbtn.act{color:var(--fg);border-color:var(--line-2);background:var(--surface-2)}
  .tbtn.ico{padding:8px 11px}
  .fdot{min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--accent);color:var(--accent-ink);font-size:10.5px;font-weight:800;display:none;place-items:center}
  .fdot.on{display:grid}
  /* shared popover — same look as #ctx, reused for sort + filter menus */
  #pop{position:fixed;z-index:200;min-width:200px;max-width:280px;background:var(--ink-3);border:1px solid var(--line-2);border-radius:13px;padding:6px;box-shadow:0 26px 64px -20px #000,0 0 0 1px rgba(0,0,0,.35);display:none}
  #pop.open{display:block;animation:pop .14s var(--ease-out)}
  #pop .ci{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;font-size:13.5px;cursor:pointer;white-space:nowrap;color:var(--fg)}
  #pop .ci:hover{background:var(--hover)}
  #pop .ci .k{width:17px;text-align:center;opacity:.85;font-size:12px;flex:0 0 auto}
  #pop .ci .on{margin-left:auto;color:var(--good);font-size:12px}
  #pop .grp{padding:9px 11px 4px;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-mute);font-weight:700}
  #pop .sep{height:1px;background:var(--line);margin:5px 9px}
  .gcell{cursor:pointer;transition:transform .3s var(--ease)}
  @media (hover:hover){.gcell:hover{transform:translateY(-8px) scale(1.03);z-index:2;position:relative}}
  .gcell .poster{width:100%}
  .gcell .gt{font-size:13.5px;font-weight:600;margin-top:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gcell .gs{font-size:12px;color:var(--fg-mute);margin-top:2px}
  .sk .poster{background:linear-gradient(100deg,var(--ink-2) 30%,var(--ink-3) 50%,var(--ink-2) 70%);background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .empty{padding:60px var(--pad);color:var(--fg-mute);text-align:center}

  /* detail */
  #detail{position:fixed;inset:0;z-index:60;background:var(--ink);opacity:0;pointer-events:none;transition:opacity .4s var(--ease-out)}
  #detail.open{opacity:1;pointer-events:auto}
  #detail.open .dhead{animation:fadeUp .6s var(--ease-out) both}#detail.open .dbody{animation:fadeUp .6s var(--ease-out) .1s both}
  .dscroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden}
  .dclose{position:fixed;top:20px;right:24px;z-index:8;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);color:#fff;display:grid;place-items:center;backdrop-filter:blur(10px);transition:.3s}
  .dclose:hover{background:rgba(0,0,0,.75);transform:rotate(90deg)}.dclose svg{width:18px;height:18px}
  .dhero{position:relative;min-height:70vh;display:flex;align-items:flex-end;overflow:hidden}
  .dhero .bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center}
  .dhero::after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(0deg,var(--ink) 2%,rgba(var(--bg-rgb),.5) 40%,rgba(var(--bg-rgb),0) 74%),linear-gradient(90deg,rgba(var(--bg-rgb),.7),transparent 62%)}
  .dhead{position:relative;z-index:2;width:100%;padding:0 var(--pad) 44px}
  .dtitle{font-size:clamp(38px,5.4vw,72px);font-weight:800;letter-spacing:-.03em;line-height:.95;margin:0 0 14px;max-width:16ch;text-wrap:balance;text-shadow:0 2px 40px rgba(0,0,0,.4)}
  .dtag{color:var(--fg-dim);font-size:16px;margin-bottom:14px;max-width:60ch}
  .dmeta{display:flex;align-items:center;gap:13px;flex-wrap:wrap;color:var(--fg-dim);font-size:14.5px;font-weight:500}
  .dmeta .q{border:1px solid var(--line-2);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--fg)}
  .rating{color:var(--fg);font-weight:700}
  .dactions{display:flex;align-items:center;gap:12px;margin-top:26px;flex-wrap:wrap}
  .dbody{padding:40px var(--pad) 96px}
  .dsec{margin-bottom:44px}
  .dsec>h3{font-size:19px;font-weight:700;margin:0 0 20px}
  .ov{color:var(--fg-dim);line-height:1.75;font-size:16px;max-width:80ch;margin:0}
  .castrail{display:flex;gap:16px;overflow-x:auto;padding:20px 2px 24px;margin:-20px 0}.castrail::-webkit-scrollbar{height:0}
  .castc{flex:0 0 auto;width:110px;text-align:center}
  .castc .cav{width:110px;height:110px;border-radius:14px;background:linear-gradient(140deg,#3b4254,#242a3a);background-size:cover;background-position:center;border:1px solid var(--line)}
  .castc .cn{font-size:13.5px;font-weight:600;margin-top:9px;line-height:1.25}
  .castc .cr{font-size:12px;color:var(--fg-mute);margin-top:2px}
  .infogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0 32px;max-width:820px}
  .inforow{display:flex;flex-direction:column;gap:4px;padding:14px 0;border-top:1px solid var(--line)}
  .inforow .k{font-size:12px;color:var(--fg-mute)}.inforow .v{font-size:14px;color:var(--fg);font-weight:600}
  .seasons{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .stab{padding:9px 18px;border-radius:999px;font-size:13.5px;font-weight:600;color:var(--fg-dim);border:1px solid var(--line);background:var(--surface);cursor:pointer;transition:.2s}
  .stab.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .ep{display:grid;grid-template-columns:172px 1fr auto;gap:18px;padding:16px 12px;border-bottom:1px solid var(--line);cursor:pointer;align-items:center;transition:.2s}
  .ep:first-child{border-top:1px solid var(--line)}.ep:hover{background:var(--hover)}
  .epthumb{width:172px;aspect-ratio:16/9;border-radius:10px;background:var(--ink-3);background-size:cover;background-position:center;position:relative}
  .epthumb .en{position:absolute;left:7px;top:7px;font-size:11px;font-weight:800;color:#fff;background:rgba(0,0,0,.6);border-radius:5px;padding:2px 7px}
  .epthumb .pw{height:3px}
  .ep .et{font-size:15.5px;font-weight:600}
  .ep .eo{font-size:13px;color:var(--fg-mute);margin-top:5px;line-height:1.55;max-width:56ch;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ep .ert{font-size:12.5px;color:var(--fg-mute);white-space:nowrap}
  .watched{color:var(--good)}

  /* chooser + preplay */
  .chooser{display:flex;flex-direction:column;gap:20px;max-width:900px}
  .chz .lbl{font-size:12px;font-weight:700;letter-spacing:.07em;color:var(--fg-mute);text-transform:uppercase;margin-bottom:9px}
  .chz .opts{display:flex;gap:8px;flex-wrap:wrap}
  .chnote{font-size:12.5px;line-height:1.6;color:var(--fg-mute);border-left:2px solid var(--line);padding-left:11px}
  .chopt{padding:9px 15px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--fg-dim);border:1px solid var(--line);background:var(--surface);cursor:pointer;transition:.2s}
  .chopt:hover{color:var(--fg);border-color:var(--line-2)}.chopt.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  #preplay{position:fixed;inset:0;z-index:85;display:none;place-items:center;background:rgba(6,8,12,.62);backdrop-filter:blur(6px);padding:24px}
  #preplay.open{display:grid}
  .ppbox{width:min(660px,94vw);max-height:86vh;overflow:auto;background:var(--ink-2);border:1px solid var(--line);border-radius:20px;box-shadow:0 40px 100px -30px #000;animation:pop .28s var(--ease)}
  @keyframes pop{from{transform:translateY(-12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .pphead{display:flex;align-items:flex-start;gap:14px;padding:22px 24px 8px}

  /* ======================================================================
     PHONE
     Emby's own web client ships no phone layout at all ("it does not
     currently have any mobile designs" -- their docs), and Jellyfin, which
     forked it, answers with an off-canvas drawer you have to swipe out from
     the left edge. Both put navigation where a thumb cannot reach and neither
     has gestures. So this is not a squeeze of the desktop layout:

       * the 68px rail becomes a labelled bottom tab bar, in the thumb zone,
         always visible -- no drawer to summon
       * the top bar hides itself as you scroll down and comes back the moment
         you scroll up, so the artwork gets the whole screen
       * the search collapses to its icon and takes the row when focused
       * every centred dialog becomes a bottom sheet
       * long-press replaces right-click for the card menu (see the script)

     One breakpoint, not Jellyfin's thirteen: below 760px the layout is a
     different shape, above it the desktop one already works.
     ====================================================================== */
  @media (max-width:760px){
    :root{--pad:16px}

    /* --- shell: rail moves to the bottom edge --- */
    #app{grid-template-columns:minmax(0,1fr);grid-template-rows:minmax(0,1fr) auto}
    #rail{
      grid-row:2;flex-direction:row;justify-content:space-around;align-items:stretch;
      gap:0;padding:6px 4px calc(4px + env(safe-area-inset-bottom));
      border-right:0;border-top:1px solid var(--line);
      background:rgba(var(--bg-rgb),.93);backdrop-filter:blur(18px);
    }
    .brand,.rail-sp{display:none}
    .navbtn,.avatar{
      width:auto;flex:1;min-width:0;height:auto;min-height:48px;border-radius:12px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      margin:0;padding:5px 2px;
    }
    .navbtn svg{width:22px;height:22px;flex:0 0 auto}
    /* The label is the button's own tooltip -- no second copy to keep in sync. */
    .navbtn::after,.avatar::after{
      content:attr(title);font-size:10px;font-weight:600;line-height:1;
      max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    /* Until a server icon loads the avatar has nothing to draw, and on a tab bar
       an invisible tab is an unusable one -- so it keeps a placeholder disc that
       the icon replaces. `title` is "账户 / 退出", too long for a 76px tab. */
    .avatar{overflow:visible;background:none;border:0}
    .avatar::before{content:'';width:22px;height:22px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-2);flex:0 0 auto}
    .avatar.has-icon::before{display:none}
    .avatar::after{content:'账户';color:var(--fg-mute)}
    .avatar img{position:static;width:22px;height:22px;border-radius:50%}
    /* The desktop selection marker is a bar off the rail's left edge; here it
       belongs over the icon. */
    .navbtn.on::before{left:50%;top:2px;transform:translateX(-50%);width:18px;height:3px}

    /* --- top bar: gets out of the way while you scroll --- */
    #topbar{
      padding:10px var(--pad);padding-top:calc(10px + env(safe-area-inset-top));gap:10px;
      transition:transform .26s var(--ease-out),background .3s;
    }
    #view.hide-bar #topbar{transform:translateY(-100%)}
    #serverPill{display:none}
    .crumbs{font-size:15px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .search{width:44px;height:42px;flex:0 0 auto;padding:0;justify-content:center;overflow:hidden;transition:width .22s var(--ease-out)}
    /* flex:0 0 0, not width:0 -- the base rule's flex-grow would otherwise pull
       the field back open and leave a clipped word next to the magnifier. */
    .search input{flex:0 0 0;width:0;padding:0;font-size:16px}   /* 16px: below that iOS zooms the page on focus */
    .search:focus-within{width:auto;flex:1 1 auto;padding:0 12px;justify-content:flex-start}
    .search:focus-within input{flex:1 1 auto;width:auto}

    /* --- hero: the desktop fade runs left-to-right, which in portrait leaves
           the title sitting on the bright part of the artwork --- */
    #hero{height:auto;min-height:52dvh;padding:0 var(--pad) 22px;margin-top:-56px}
    #hero::after{background:linear-gradient(0deg,var(--ink) 5%,rgba(var(--bg-rgb),.55) 42%,rgba(var(--bg-rgb),.15) 78%)}
    .hero-inner{max-width:none;width:100%}
    .hero-title{font-size:clamp(26px,7.6vw,42px);margin-bottom:10px}
    .hero-meta{font-size:13px;gap:9px;margin-bottom:10px}
    .hero-desc{font-size:13.5px;-webkit-line-clamp:2;margin-bottom:16px}
    .btn-row{gap:10px}
    .btn.play{flex:1;justify-content:center}

    /* --- rails and grids --- */
    #rails{margin-top:-18px}
    .rail{margin:22px 0}
    .rail-head h2{font-size:17px}
    .track{gap:12px;padding:18px var(--pad) 22px}
    .card{--pw:clamp(104px,30vw,150px)}
    .card.land{--pw:clamp(196px,62vw,300px)}
    .ctitle{font-size:12.5px;margin-top:7px}
    /* Three posters and a sliver of the fourth: enough to read a title, enough
       to show the row keeps going. Jellyfin gives a phone two. */
    .grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:16px 10px;padding:16px var(--pad) 34px}
    .gcell .gt{font-size:12px;margin-top:7px}
    .gcell .gs{font-size:11px}
    .libcards{grid-template-columns:minmax(0,1fr);gap:12px;padding:16px var(--pad) 34px}
    .libcard .ln{font-size:19px}
    .page-head{padding:20px var(--pad) 0;gap:10px 12px;flex-wrap:wrap}
    .page-title{font-size:24px}
    /* toolbar drops to its own full-width row; density is desktop-only (mobile
       grid is a fixed 3 columns below, so the control would be a no-op) */
    .libtools{width:100%;margin:6px 0 0}
    .libtools .tbtn{flex:1;justify-content:center;padding:11px 10px}
    #libDensity{display:none}
    .chips{padding:12px var(--pad) 4px;gap:8px}
    .gchip,.stab{padding:10px 15px;font-size:13px}    /* 40px tall, thumb-sized */

    /* --- detail --- */
    .dhero{min-height:58dvh}
    .dhero::after{background:linear-gradient(0deg,var(--ink) 3%,rgba(var(--bg-rgb),.6) 44%,rgba(var(--bg-rgb),.1) 80%)}
    .dhead{padding:0 var(--pad) 26px}
    .dtitle{font-size:clamp(27px,7.8vw,46px);max-width:none;margin-bottom:10px}
    .dtag{font-size:14px;margin-bottom:10px}
    .dmeta{font-size:13px;gap:10px}
    .dactions{margin-top:18px;gap:10px}
    .dbody{padding:26px var(--pad) 100px}
    .dsec{margin-bottom:32px}
    .dsec>h3{font-size:17px;margin-bottom:14px}
    .ov{font-size:14.5px;line-height:1.7}
    .dclose{top:calc(12px + env(safe-area-inset-top));right:14px;width:44px;height:44px}
    .castc,.castc .cav{width:88px}.castc .cav{height:88px}
    .ep{grid-template-columns:104px 1fr;gap:12px;padding:12px 4px}
    .epthumb{width:104px}
    .ep .et{font-size:14px}
    .ep .eo{font-size:12px;-webkit-line-clamp:2}

    /* --- admin: minmax(360px,...) is wider than the screen, so the whole
           dashboard scrolled sideways --- */
    .adm{grid-template-columns:minmax(0,1fr);padding:16px var(--pad) 34px}
    .akv{grid-template-columns:minmax(0,1fr);gap:1px 0}
    .akv dt{margin-top:7px}

    /* --- every centred dialog becomes a bottom sheet --- */
    #preplay,#dlg{place-items:end center;padding:0}
    .ppbox,.dlgbox{
      width:100%;max-width:none;border-radius:20px 20px 0 0;border-width:1px 0 0;
      max-height:88dvh;animation:sheet-up .26s var(--ease-out);
    }
    .ppbox{padding-bottom:env(safe-area-inset-bottom)}
    .dlgbox{padding-bottom:calc(22px + env(safe-area-inset-bottom))}
    .ppfoot{padding:16px 20px calc(20px + env(safe-area-inset-bottom))}
    .pphead{padding:18px 20px 6px}.ppbody{padding:12px 20px 6px}
    .ppnote{font-size:11.5px}
    .chz .opts{gap:7px}
    .chopt{padding:11px 15px}
    .fld input,.fld textarea,.fld select,.lfield input{font-size:16px;padding:11px 12px}
    .dlgfoot .btn{flex:1;justify-content:center}

    /* --- card menu: a sheet too, because it is reached by long-press and a
           popup anchored to a fingertip would sit under the finger --- */
    #ctx{
      left:0!important;right:0!important;top:auto!important;bottom:0!important;
      min-width:0;max-width:none;width:100%;border-radius:20px 20px 0 0;border-width:1px 0 0;
      padding:8px 8px calc(10px + env(safe-area-inset-bottom));
    }
    #ctx.open{animation:sheet-up .22s var(--ease-out)}
    #ctx .ci{padding:13px 14px;font-size:15px}
    #ctx .chead{padding:10px 14px;font-size:12.5px}

    /* --- login --- */
    .lbox{padding:26px 20px;margin:0 14px;width:auto;max-height:92dvh;overflow:auto}
    #toast{left:14px;right:14px;transform:translateY(20px);bottom:calc(84px + env(safe-area-inset-bottom));text-align:center}
    #toast.show{transform:none}
  }
  @keyframes sheet-up{from{transform:translateY(100%)}to{transform:none}}

  /* The overlay button on a card is hover-revealed on the desktop; on touch it
     is already forced visible above, but 28px is below every platform's tap
     minimum (44 Apple, 48 Material). */
  @media (pointer:coarse){
    .cmore{width:38px;height:38px;font-size:19px;top:5px;right:5px}
    .navbtn:hover,.backbtn:hover,.abtn:hover{background:none}
  }

<!-- right-click menu -->
<div id="ctx"></div>
<!-- shared popover for library sort / filter menus -->
<div id="pop"></div>

<!-- metadata / identify dialog -->
<div id="dlg"><div class="dlgbox" id="dlgBox"></div></div>

<!-- detail -->
<div id="detail">
  <button class="dclose" id="dclose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg></button>

</div>

<!-- preplay -->
<div id="preplay"><div class="ppbox">
  <div class="pphead"><div class="ppt" id="ppTitle"></div><button class="ppclose" id="ppClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg></button></div>
  <div class="ppbody" id="ppBody"></div>
  <div class="ppfoot"><span class="ppnote">✓ 记住本次选择</span><button class="btn ghost sm" id="ppCancel">取消</button><button class="btn play" id="ppGo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4v16l13-8z"/></svg><span>播放</span></button></div>
</div></div>

<div id="toast"></div>

<script type="module">
// `directUrl` is aliased: this page already has a function of that name for the
// right-click menu, which resolves the EMBY stream URL. The imported one is a
// different thing entirely -- the URL inside a .strm.
import { EmbyClient, servers, serverIcons, fmtRuntime, ticksToSec, progressOf, subtitleDelivery, isRemoteSource, directUrl as strmTargetUrl } from '../src/emby/client.js';

const $ = s => document.querySelector(s);
const store = { get(k,d){try{const v=localStorage.getItem('linweb:'+k);return v==null?d:JSON.parse(v);}catch{return d;}}, set(k,v){try{localStorage.setItem('linweb:'+k,JSON.stringify(v));}catch{}} };
let EM = null;
const toast = (m, err) => { const t = $('#toast'); t.textContent = m; t.className = 'show' + (err ? ' err' : ''); clearTimeout(toast._t); toast._t = setTimeout(() => t.className = '', 3200); };

// ---------- theme ----------
(function initTheme(){ const t = store.get('theme',''); if (t) document.documentElement.dataset.theme = t; })();
$('#themeBtn').onclick = () => { const cur = document.documentElement.dataset.theme; const dark = cur === 'light' || (!cur && !matchMedia('(prefers-color-scheme: light)').matches);
  const next = (cur ? cur === 'dark' : !matchMedia('(prefers-color-scheme: dark)').matches) ? 'light' : 'dark';
  document.documentElement.dataset.theme = next; store.set('theme', next); };

// ---------- image helpers (with gradient fallback so nothing shows broken) ----------
const hashGrad = s => { let h = 0; for (const c of (s||'x')) h = (h*31 + c.charCodeAt(0)) >>> 0; return `linear-gradient(150deg,hsl(${h%360} 42% 28%),hsl(${(h>>3)%360} 38% 11%))`; };
const posterBg = it => { const u = EM.imageUrl(it, 'Primary', { maxWidth: 360 }); return u ? `background-image:url('${u}')` : `background-image:${hashGrad(it.Name)}`; };
const thumbBg  = it => { const u = EM.imageUrl(it, 'Primary', { maxWidth: 480 }); return u ? `background-image:url('${u}')` : `background-image:${hashGrad(it.Name)}`; };
const backdropBg = it => { const u = EM.backdropUrl(it, { maxWidth: 1600 }); return u ? `background-image:url('${u}')` : `background-image:${hashGrad(it.Name)}`; };
const personBg = p => { if (p.PrimaryImageTag) { const q = new URLSearchParams({ tag: p.PrimaryImageTag, maxWidth: '180', quality: '90' }); if (EM.token) q.set('api_key', EM.token); return `background-image:url('${EM.server}/Items/${p.Id}/Images/Primary?${q}')`; } return `background-image:${hashGrad(p.Name)}`; };
const yearOf = it => it.ProductionYear || (it.PremiereDate||'').slice(0,4);
const ratingOf = it => it.CommunityRating ? it.CommunityRating.toFixed(1) : null;

// ---------- cards ----------
// Every list that renders leaves its items behind: the right-click menu needs
// the whole object (UserData, CanDelete, MediaSources), not just the id sitting
// in the DOM. keepAll() is called wherever a list reaches the renderer.
const CACHE = new Map();
const keep = it => { if (it?.Id) CACHE.set(it.Id, it); return it; };
const keepAll = list => { (list || []).forEach(keep); return list || []; };
const posterCard = it => `<div class="card" data-open="${it.Id}"><div class="poster" style="${posterBg(it)}"><button class="cmore" tabindex="-1" aria-label="更多操作">⋯</button>${progressOf(it)>0?`<div class="pw"><i style="width:${progressOf(it)*100}%"></i></div>`:''}</div>
  <div class="ctitle">${it.Name}</div><div class="csub num">${[yearOf(it), ratingOf(it)?'★'+ratingOf(it):''].filter(Boolean).join(' · ')}</div></div>`;
const landCard = it => { const ep = it.Type === 'Episode'; const title = ep ? (it.SeriesName||it.Name) : it.Name;
  const sub = ep ? `S${it.ParentIndexNumber||1}:E${it.IndexNumber||1} · ${it.Name}` : (yearOf(it)+(it.Genres?.[0]?' · '+it.Genres[0]:''));
  return `<div class="card land" data-resume="${it.Id}"><div class="poster" style="${thumbBg(it)}"><button class="cmore" tabindex="-1" aria-label="更多操作">⋯</button><div class="pw"><i style="width:${progressOf(it)*100}%"></i></div></div>
  <div class="ctitle">${title}</div><div class="csub">${sub}</div></div>`; };
const gcell = it => `<div class="gcell" data-open="${it.Id}"><div class="poster" style="${posterBg(it)}"><button class="cmore" tabindex="-1" aria-label="更多操作">⋯</button>${progressOf(it)>0?`<div class="pw"><i style="width:${progressOf(it)*100}%"></i></div>`:''}</div>
  <div class="gt">${it.Name}</div><div class="gs num">${[yearOf(it), it.Type==='Series'?'剧集':'', ratingOf(it)?'★'+ratingOf(it):''].filter(Boolean).join(' · ')}</div></div>`;
const rail = (title, items, land) => keepAll(items).length ? `<section class="rail"><div class="rail-head"><h2>${title}</h2></div><div class="track">${items.map(land?landCard:posterCard).join('')}</div></section>` : '';

function bindCards(scope=document){
  scope.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openDetail(el.dataset.open));
  scope.querySelectorAll('[data-resume]').forEach(el=>el.onclick=()=>openPreplayFor(el.dataset.resume));
}

// ---------- home ----------
let views = [];
async function renderHome(){
  crumb('首页');
  try {
    views = await EM.views();
    const resume = await EM.resume();
    const rails = $('#rails');
    let html = rail('继续观看', resume, true);
    // one "最近添加" rail per real library (movies/tv first)
    const media = views.filter(v => ['movies','tvshows','mixed','boxsets','music'].includes(v.CollectionType) || !v.CollectionType);
    const latests = await Promise.all(media.slice(0,6).map(v => EM.latest(v.Id, 20).then(items => [v, items]).catch(()=>[v,[]])));
    for (const [v, items] of latests) html += rail(`最近添加 · ${v.Name}`, items, false);
    rails.innerHTML = html || '<div class="empty">这个账户下还没有媒体库内容。</div>';
    bindCards(rails);
    // hero = first resumable or first latest movie with a backdrop
    const heroItem = resume[0] || latests.flatMap(([,i])=>i).find(i=>i.BackdropImageTags?.length) || latests.flatMap(([,i])=>i)[0];
    if (heroItem) setHero(heroItem);
  } catch (e) { fail(e); }
}
let heroItem = null;
function setHero(it){
  heroItem = it;
  $('#heroBg').style.cssText = backdropBg(it);
  $('#heTitle').textContent = it.Type==='Episode' ? (it.SeriesName||it.Name) : it.Name;
  $('#heDesc').textContent = it.Overview || '';
  const bits = [yearOf(it), fmtRuntime(it.RunTimeTicks), it.Genres?.slice(0,2).join(' · '), ratingOf(it)?'★ '+ratingOf(it):''].filter(Boolean);
  $('#heMeta').innerHTML = bits.map(b=>`<span>${b}</span>`).join('<span class="dot"></span>');
}
$('#heroPlay').onclick = () => { if (!heroItem) return; heroItem.Type==='Series' ? openDetail(heroItem.Id) : openPreplayFor(heroItem.Id, heroItem); };
$('#heroInfo').onclick = () => heroItem && openDetail(heroItem.Id);

// ---------- library ----------
const collLabel = { movies:'电影', tvshows:'剧集', music:'音乐', boxsets:'合集', homevideos:'家庭', mixed:'混合' };
async function renderLibraries(){
  crumb('媒体库');
  $('#libLanding').style.display='block'; $('#libDetail').style.display='none';
  if (!views.length) views = await EM.views().catch(()=>[]);
  keepAll(views); $("#libTotal").textContent = `${views.length} 个库`;
  $('#libCards').innerHTML = views.map(v=>`<div class="libcard" data-lib="${v.Id}" style="${backdropBg(v)}">
    <div class="lx"><div class="ln">${v.Name}</div><div class="lc">${collLabel[v.CollectionType]||'库'}</div></div></div>`).join('');
  $('#libCards').querySelectorAll('.libcard').forEach(el=>el.onclick=()=>openLibrary(views.find(v=>v.Id===el.dataset.lib)));
}
// Sort fields Emby exposes for movie/series libraries (music/episode-only ones
// left out). Value = Emby SortBy, label = the button text.
const SORTS = [['SortName','名称'],['CommunityRating','评分'],['DateCreated','最近添加'],['PremiereDate','上映日期'],['ProductionYear','年份'],['Runtime','时长'],['Random','随机']];
const sortLabel = k => (SORTS.find(s=>s[0]===k)||SORTS[0])[1];
// Grid density — beyond Emby, whose web client has no density control. Global.
const DENSITY = ['compact','cozy','roomy'], DMIN = {compact:'120px',cozy:'160px',roomy:'210px'}, DNAME = {compact:'紧凑',cozy:'适中',roomy:'宽松'};
const applyDensity = () => $('#libGrid').style.setProperty('--gmin', DMIN[store.get('libDensity','cozy')]||DMIN.cozy);

const PAGE = 60;
const libDefaults = () => ({ sortBy:'SortName', sortOrder:'Ascending', genre:'全部', filters:{ played:'', fav:false, resumable:false, hd:false, uhd:false, subs:false } });
let libCtx = null, libState = libDefaults(), libTypes = null, libOffset = 0, libTotal = 0, libLoading = false, libDone = false;

async function openLibrary(v){
  libCtx = v; crumb('媒体库', v.Name);
  $('#libLanding').style.display='none'; $('#libDetail').style.display='block'; $('#view').scrollTop=0;
  $('#libDName').innerHTML = v.Name;
  libTypes = v.CollectionType==='tvshows' ? 'Series' : v.CollectionType==='movies' ? 'Movie' : null;
  applyDensity();
  // Beyond Emby: restore the sort/filter/genre this library was last left in.
  // Emby's own page forgets every choice on reload.
  const saved = store.get('lib:'+v.Id, null);
  libState = saved ? { ...libDefaults(), ...saved, filters:{ ...libDefaults().filters, ...(saved.filters||{}) } } : libDefaults();
  // genres for chips (best-effort)
  let genres = [];
  try { genres = (await EM._get('/Genres', { ParentId: v.Id, UserId: EM.userId })).Items?.slice(0,14).map(g=>g.Name) || []; } catch {}
  if (!['全部',...genres].includes(libState.genre)) libState.genre = '全部';
  $('#libChips').innerHTML = ['全部',...genres].map(g=>`<span class="gchip ${g===libState.genre?'on':''}">${g}</span>`).join('');
  $('#libChips').querySelectorAll('.gchip').forEach(c=>c.onclick=()=>{ $('#libChips').querySelectorAll('.gchip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); libState.genre=c.textContent; saveLibState(); reload(); });
  syncToolbar();
  reload();
}
const saveLibState = () => { if (libCtx) store.set('lib:'+libCtx.Id, libState); };

function libQuery(start){
  const f = libState.filters;
  const fl = [f.played, f.fav&&'IsFavorite', f.resumable&&'IsResumable'].filter(Boolean);
  return { parentId: libCtx.Id, types: libTypes, recursive: !!libTypes,
    sortBy: libState.sortBy, sortOrder: libState.sortOrder,
    genre: libState.genre!=='全部'?libState.genre:null,
    filters: fl.join(',')||null, ishd: f.hd||null, is4k: f.uhd||null, hasSubtitles: f.subs||null,
    start, limit: PAGE };
}

// Full reload from offset 0 (library opened, or sort/filter/genre changed).
async function reload(){
  const grid = $('#libGrid');
  libOffset = 0; libTotal = 0; libDone = false; libLoading = true;
  grid.innerHTML = Array.from({length:14}).map(()=>`<div class="gcell sk"><div class="poster"></div></div>`).join('');
  $('#libMore').innerHTML = '';
  try {
    const { items, total } = await EM.itemsPage(libQuery(0));
    libTotal = total; libOffset = items.length;
    grid.innerHTML = keepAll(items).length ? items.map(gcell).join('') : '<div class="empty">该筛选下暂无内容。</div>';
    bindCards(grid);
    $('#libCount').textContent = total ? `共 ${total} 部` : '';
    // Random reshuffles every page, so paginating it yields dup/missing items —
    // take the first batch and stop.
    if (libState.sortBy==='Random' || libOffset>=libTotal) libDone = true;
    updateMore();
  } catch (e) { grid.innerHTML=''; $('#libCount').textContent=''; fail(e); }
  finally { libLoading = false; }
}
async function loadMore(){
  if (libLoading || libDone || !libCtx) return;
  libLoading = true; $('#libMore').innerHTML = '<div class="sp"></div>';
  try {
    const { items } = await EM.itemsPage(libQuery(libOffset));
    keepAll(items); libOffset += items.length;
    $('#libGrid').insertAdjacentHTML('beforeend', items.map(gcell).join(''));
    bindCards($('#libGrid'));
    if (!items.length || libOffset>=libTotal) libDone = true;
    updateMore();
  } catch (e) { fail(e); }
  finally { libLoading = false; }
}
const updateMore = () => $('#libMore').innerHTML = libDone ? (libTotal>PAGE?`<div class="end">已到底 · 共 ${libTotal} 部</div>`:'') : '<div class="sp"></div>';
// Infinite scroll — the sentinel entering view pulls the next page.
new IntersectionObserver(es=>{ if (es.some(e=>e.isIntersecting)) loadMore(); }, { root: $('#view'), rootMargin:'700px' }).observe($('#libMore'));

// ---- sort / filter popover (same look as the right-click menu) ----
const activeFilterCount = () => { const f=libState.filters; return (f.played?1:0)+(f.fav?1:0)+(f.resumable?1:0)+(f.hd?1:0)+(f.uhd?1:0)+(f.subs?1:0); };
function syncToolbar(){
  $('#libSortLbl').textContent = sortLabel(libState.sortBy) + (libState.sortOrder==='Descending'?' ↓':' ↑');
  const n = activeFilterCount(), dot = $('#libFcount');
  dot.textContent = n; dot.classList.toggle('on', n>0);
  $('#libFilter').classList.toggle('act', n>0);
}
const POP = $('#pop');
const closePop = () => POP.classList.remove('open');
function openPop(anchor, rows, onPick){
  POP.innerHTML = rows.map(r=> r.sep?'<div class="sep"></div>' : r.grp?`<div class="grp">${r.grp}</div>`
    : `<div class="ci" data-k="${r.k}"><span class="k">${r.i||''}</span><span>${r.t}</span>${r.on?'<span class="on">●</span>':''}</div>`).join('');
  POP.classList.add('open');
  const b = POP.getBoundingClientRect(), a = anchor.getBoundingClientRect();
  POP.style.left = Math.max(8, Math.min(a.right - b.width, innerWidth - b.width - 8)) + 'px';
  POP.style.top  = Math.min(a.bottom + 6, innerHeight - b.height - 8) + 'px';
  // stop the bubble: showFilterMenu() rebuilds this menu on pick, so by the time
  // the document close-handler runs the clicked row is detached and would read as
  // "outside", closing a menu meant to stay open for multi-select.
  POP.querySelectorAll('.ci').forEach(el=>el.onclick=ev=>{ ev.stopPropagation(); onPick(el.dataset.k); });
}
$('#libSort').onclick = e => { e.stopPropagation();
  const rows = [ {grp:'排序方式'}, ...SORTS.map(([k,t])=>({k:'s:'+k, t, on: libState.sortBy===k})),
    {sep:1}, {grp:'顺序'},
    {k:'o:Ascending', t:'升序', on: libState.sortOrder==='Ascending'},
    {k:'o:Descending', t:'降序', on: libState.sortOrder==='Descending'} ];
  openPop($('#libSort'), rows, k=>{ const [t,v]=k.split(':'); if(t==='s') libState.sortBy=v; else libState.sortOrder=v; saveLibState(); syncToolbar(); closePop(); reload(); });
};
function showFilterMenu(){ const f = libState.filters;
  const rows = [ {grp:'状态'},
    {k:'p:', t:'全部', on: !f.played},
    {k:'p:IsUnplayed', t:'未播放', on: f.played==='IsUnplayed'},
    {k:'p:IsPlayed', t:'已播放', on: f.played==='IsPlayed'},
    {k:'t:fav', t:'收藏', i: f.fav?'✓':'', on: f.fav},
    {k:'t:resumable', t:'可继续观看', i: f.resumable?'✓':'', on: f.resumable},
    {sep:1}, {grp:'画质与特性'},
    {k:'t:hd', t:'HD', i: f.hd?'✓':'', on: f.hd},
    {k:'t:uhd', t:'4K', i: f.uhd?'✓':'', on: f.uhd},
    {k:'t:subs', t:'有字幕', i: f.subs?'✓':'', on: f.subs},
    ...(activeFilterCount()? [{sep:1},{k:'clear', t:'清除筛选', i:'✕'}] : []) ];
  openPop($('#libFilter'), rows, k=>{
    if (k==='clear') libState.filters = libDefaults().filters;
    else { const [t,v]=k.split(':'); if(t==='p') f.played=v; else f[v]=!f[v]; }
    saveLibState(); syncToolbar(); reload(); showFilterMenu();  // keep open for multi-select
  });
}
$('#libFilter').onclick = e => { e.stopPropagation(); showFilterMenu(); };
$('#libDensity').onclick = e => { e.stopPropagation();
  const next = DENSITY[(DENSITY.indexOf(store.get('libDensity','cozy'))+1)%DENSITY.length];
  store.set('libDensity', next); applyDensity(); toast(`网格密度：${DNAME[next]}`);
};
document.addEventListener('click', e=>{ if (POP.classList.contains('open') && !e.target.closest('#pop,#libSort,#libFilter')) closePop(); });
$('#libBack').onclick = renderLibraries;

// ---------- search ----------
let searchTimer=null;
$('#topSearch').oninput = e => { const q = e.target.value.trim(); clearTimeout(searchTimer); searchTimer = setTimeout(()=>runSearch(q), 300); };
async function runSearch(q){
  if (!$('#v-search').classList.contains('on')) go('search');
  $('#searchHead').textContent = q ? `搜索 “${q}”` : '搜索';
  const grid = $('#searchGrid');
  if (!q) { grid.innerHTML='<div class="empty">输入关键字搜索影片、剧集、演员。</div>'; return; }

// ---------- play handoff: resolve a DIRECT url, hand to the real player ----------
async function play(item, choice, fromStart){
  toast('正在解析播放地址…');
  try {
    const pb = await EM.playbackInfo(item.Id);
    // honour the chosen version (MediaSource) if the user picked one
    let source = pb.source;
    if (choice && choice.ver != null && pb.sources?.[choice.ver]) source = pb.sources[choice.ver];
    // Hand the player the raw Emby /Videos/stream URL. It 302-redirects to a CDN
    // on another origin; HttpSource resolves that redirect itself at fetch-time (a
    // simple no-Range GET it is allowed to follow), so we must NOT pre-resolve it
    // here. Pre-resolving before this full page navigation raced the CDN link's
    // TTL, and when it failed it silently handed play.html an un-followable 302 --
    // the "CORS on playback" bug. Stable URL in, fresh resolve at the fetch.
    const url = EM.streamUrl(item.Id, source);
    const title = item.Type==='Episode' ? `${item.SeriesName||''} S${item.ParentIndexNumber||1}E${item.IndexNumber||1} · ${item.Name}` : item.Name;
    const startTicks = fromStart ? 0 : (item.UserData?.PlaybackPositionTicks || 0);
    // Hand off to the dedicated Emby player (play.html). It owns the session
    // lifecycle (start/progress/stopped) so resume works both ways, and it reads
    // the chosen audio + subtitle below so the detail-page picks are honoured --
    // the generic index.html player knew nothing about either.
    const q = new URLSearchParams({ url, title, id: item.Id });
    // For a .strm item, the URL inside it travels alongside the Emby one as a
    // CANDIDATE -- play.html tries it first so the bytes need not pass through
    // the server at all. Deliberately un-probed here: the comment above is the
    // scar from pre-resolving before this navigation, and the same reasoning
    // applies twice over to a signed link. The page tests it at load time, when
    // the answer is still true, and falls back to `url` if it is not.
    const direct = strmTargetUrl(source);
    if (direct) q.set('direct', direct);
    if (source?.Id) q.set('src', source.Id);
    // Carry the byte size so the player never has to read a Content-Range header
    // off the cross-origin (302->CDN) stream -- that header is not reliably
    // CORS-exposed, and its absence was the "did not expose a Content-Range" fail.
    if (source?.Size) q.set('size', source.Size);
    if (pb.playSessionId) q.set('ps', pb.playSessionId);
    if (startTicks) q.set('t', Math.round(ticksToSec(startTicks)));
    // Series name + episode number: what a danmaku lookup searches on. Sent
    // explicitly because the composed title above is lossy (it folds the
    // episode name in, and a movie has no S/E at all).
    if (item.Type === 'Episode') {
      q.set('series', item.SeriesName || '');
      if (item.IndexNumber) q.set('ep', item.IndexNumber);
    } else q.set('series', item.Name || '');

    // Audio: the chooser index is positional over the source's audio streams,
    // which the player enumerates in the same container order. Carry the
    // language too so the player can re-find the track if the lists ever differ.
    const auds = (source.MediaStreams||[]).filter(s=>s.Type==='Audio');
    if (choice?.aud) q.set('aud', choice.aud);
    if (auds[choice?.aud||0]?.Language) q.set('audlang', auds[choice?.aud||0].Language);

    // Subtitle: choice.sub is 0=off, else index into [off, ...subtitle streams].
    const subsList = (source.MediaStreams||[]).filter(s=>s.Type==='Subtitle');
    const chosenSub = choice?.sub ? subsList[choice.sub-1] : null;
    if (chosenSub) {
      const how = subtitleDelivery(chosenSub);
      if (how === 'client') {
        // ass/ssa/pgs: draw in-browser. Map to the embedded-only index the
        // player uses (external subs are not in the container, so exclude them).
        q.set('sub', subsList.filter(s=>!s.IsExternal).indexOf(chosenSub));
      } else if (how === 'text') {
        // external or embedded text sub: let Emby serve SRT into a <track>.
        q.set('suburl', EM.subtitleUrl(item.Id, source, chosenSub));
      } else {
        q.set('subwarn', chosenSub.DisplayTitle || '图形字幕');   // external bitmap: no path
      }
      if (chosenSub.Language) q.set('sublang', chosenSub.Language);
      q.set('sublabel', chosenSub.DisplayTitle || chosenSub.Language || '字幕');
    }
    location.href = `./play.html?${q}`;
  } catch (e) { fail(e); }
}

// ---------- right-click menu (parity with Emby's own card menu) ------------
// Emby's web client answers a right-click on any card with an action menu. Ours
// covers the same ground and adds the three things a direct-play client can do
// that Emby's cannot: copy the untouched stream URL, open it in a new tab, and
// read the real media specs without leaving the page.
//
// Two rules learned from probing live servers:
//   * permission comes from the DATA (item.CanDelete, EM.policy), never from a
//     guess -- the same account is admin on one server and not on another;
//   * any call can be missing on a reverse-proxied Emby, so a failure says which
//     action the server refused instead of dying quietly.
const CTX = $('#ctx');
let ctxItem = null;
let ctxOpenedAt = 0;      // guards against the auto-scroll that a click on ⋯ triggers

function closeCtx(){ CTX.classList.remove('open'); ctxItem = null; }

// One error path for every action, so a 403/404 reads as what it is.
async function act(promise, okMsg){
  try { const r = await promise; if (okMsg) toast(okMsg); return r ?? true; }
  catch (e) {
    const m = String(e.message || e);
    if (/ 403 /.test(m)) toast('服务器拒绝：当前账号没有这个权限', true);
    else if (/ 404 /.test(m)) toast('该服务器没有开放这个接口（可能被反代裁剪）', true);
    else if (/Failed to fetch|NetworkError/i.test(m)) toast('请求没发出去——跨域或线路不通', true);
    else toast(m, true);
    return null;
  }
}

const FOLDERS = ['Series','Season','BoxSet','Folder','CollectionFolder','Playlist','MusicAlbum'];

function ctxModel(it){
  const ud = it.UserData || {};
  const folder = FOLDERS.includes(it.Type);
  const resumable = (ud.PlaybackPositionTicks || 0) > 0;
  // CanDelete rides on the item itself (verified on a live server); the policy
  // flag is only the fallback for lists fetched without that field.
  const canDelete = it.CanDelete ?? !!EM.policy?.EnableContentDeletion;
  const admin = EM.isAdmin;
  return [
    !folder && { k:'play', i:'▶', t: resumable ? '继续播放' : '播放' },
    !folder && resumable && { k:'restart', i:'↺', t:'从头播放' },
    { k:'detail', i:'▤', t:'查看详情' },
    { sep:1 },
    { k:'played', i: ud.Played ? '✓' : '○', t: ud.Played ? '标记为未播放' : '标记为已播放', on: ud.Played },
    { k:'fav', i: ud.IsFavorite ? '♥' : '♡', t: ud.IsFavorite ? '取消收藏' : '加入收藏', on: ud.IsFavorite },
    { k:'like', i:'👍', t: ud.Likes === true ? '取消点赞' : '点赞', on: ud.Likes === true },
    { k:'playlist', i:'≡', t:'添加到播放列表' },
    { sep:1 },
    { k:'similar', i:'⁘', t:'更多类似' },
    { k:'info', i:'ⓘ', t:'媒体信息' },
    !folder && { k:'copy', i:'⧉', t:'复制直链' },
    !folder && { k:'newtab', i:'↗', t:'新标签播放' },
    admin && { sep:1 },
    admin && { grp:'管理' },
    admin && { k:'edit', i:'✎', t:'编辑元数据' },
    admin && { k:'identify', i:'⌕', t:'识别' },
    admin && { k:'refresh', i:'⟳', t:'刷新元数据' },
    canDelete && { sep:1 },
    canDelete && { k:'delete', i:'✕', t:'删除', danger:1 },
  ].filter(Boolean);
}

function openCtx(x, y, it){
  ctxItem = it;
  CTX.innerHTML = `<div class="chead">${it.Name || ''}</div>` + ctxModel(it).map(r =>
    r.sep ? '<div class="sep"></div>'
    : r.grp ? `<div class="grp">${r.grp}</div>`
    : `<div class="ci${r.danger?' danger':''}" data-k="${r.k}"><span class="k">${r.i}</span><span>${r.t}</span>${r.on?'<span class="on">●</span>':''}</div>`).join('');
  CTX.classList.add('open');
  ctxOpenedAt = performance.now();
  // clamp into the viewport rather than letting the menu run off the edge
  const b = CTX.getBoundingClientRect();
  CTX.style.left = Math.max(8, Math.min(x, innerWidth  - b.width  - 8)) + 'px';
  CTX.style.top  = Math.max(8, Math.min(y, innerHeight - b.height - 8)) + 'px';
  CTX.querySelectorAll('.ci').forEach(el => el.onclick = () => { const k = el.dataset.k, item = ctxItem; closeCtx(); ctxRun(k, item); });
}

document.addEventListener('contextmenu', e => {
  const el = e.target.closest?.('[data-open],[data-resume],[data-ep],[data-lib]');
  if (!el || !EM) return;
  const it = CACHE.get(el.dataset.open || el.dataset.resume || el.dataset.ep || el.dataset.lib);
  if (!it) return;
  e.preventDefault();
  openCtx(e.clientX, e.clientY, it);
});
// The ⋯ button on a card opens the same menu. Capture phase + stopPropagation so
// it beats the card's own click (which would open the detail page) -- and so the
// close-on-outside-click below never sees it. Without this button the menu is
// unreachable on a touch screen, where there is no right-click at all.
document.addEventListener('click', e => {
  const m = e.target.closest?.('.cmore');
  if (!m || !EM) return;
  e.preventDefault(); e.stopPropagation();
  const host = m.closest('[data-open],[data-resume],[data-ep]');
  const it = CACHE.get(host?.dataset.open || host?.dataset.resume || host?.dataset.ep);
  if (!it) return;
  const r = m.getBoundingClientRect();
  openCtx(r.right - 4, r.bottom + 6, it);
}, true);
// Long-press is right-click's twin on a touch screen. The ⋯ button already made
// the menu reachable, but reaching for a 38px target in a poster's corner is not
// how anyone actually uses a phone -- press the card itself and hold.
(function longPressCtx(){
  let timer = null, sx = 0, sy = 0, fired = false;
  const cancel = () => { clearTimeout(timer); timer = null; };
  document.addEventListener('pointerdown', e => {
    if (e.pointerType !== 'touch' || !EM) return;
    const el = e.target.closest?.('[data-open],[data-resume],[data-ep],[data-lib]');
    if (!el || e.target.closest('.cmore')) return;
    sx = e.clientX; sy = e.clientY; fired = false;
    const { clientX, clientY } = e;
    timer = setTimeout(() => {
      const it = CACHE.get(el.dataset.open || el.dataset.resume || el.dataset.ep || el.dataset.lib);
      if (!it) return;
      fired = true;
      navigator.vibrate?.(12);
      openCtx(clientX, clientY, it);
    }, 500);
  }, true);
  document.addEventListener('pointermove', e => { if (timer && Math.hypot(e.clientX - sx, e.clientY - sy) > 12) cancel(); }, true);
  addEventListener('pointerup', cancel, true);
  addEventListener('pointercancel', cancel, true);
  addEventListener('scroll', cancel, true);
  // The finger lifting off a long press still produces a click, and that click
  // would open the item behind the menu we just opened.
  document.addEventListener('click', e => { if (fired) { fired = false; e.preventDefault(); e.stopPropagation(); } }, true);
})();
document.addEventListener('click', e => { if (!CTX.contains(e.target)) closeCtx(); });
// Scrolling closes the menu (it is position:fixed and would drift off its card),
// but NOT the scroll the browser itself performs to bring the clicked ⋯ button
// into view -- that fired immediately after opening and made the button look
// dead on any card near the edge of a rail. Measured, not guessed: the click
// rendered the menu and something closed it within 150ms.
document.addEventListener('scroll', () => { if (performance.now() - ctxOpenedAt > 300) closeCtx(); }, true);

// Re-read one item from the server and repaint whatever list is on screen, so a
// menu action shows its result immediately instead of after a reload.
async function refreshItem(id){
  try { keep(await EM.item(id)); } catch {}
  const pane = document.querySelector('.view-pane.on')?.id;
  if (pane === 'v-home') renderHome();
  else if (pane === 'v-lib' && libCtx && $('#libDetail').style.display!=='none') reload();
  else if (pane === 'v-search') runSearch($('#topSearch').value.trim());
}

async function ctxRun(k, it){
  const ud = it.UserData || {};
  switch (k) {
    case 'play':     return openPreplayFor(it.Id, it.MediaSources ? it : null);
    case 'restart':  return openPreplayFor(it.Id, it.MediaSources ? it : null, true);
    case 'detail':   return openDetail(it.Id);
    case 'played':   if (await act(EM.markPlayed(it.Id, !ud.Played), ud.Played?'已标记为未播放':'已标记为已播放')) refreshItem(it.Id); return;
    case 'fav':      if (await act(EM.setFavorite(it.Id, !ud.IsFavorite), ud.IsFavorite?'已取消收藏':'已加入收藏')) refreshItem(it.Id); return;
    case 'like':     if (await act(EM.setLike(it.Id, ud.Likes === true ? null : true), '已更新')) refreshItem(it.Id); return;
    case 'playlist': return playlistDlg(it);
    case 'similar':  return showSimilar(it);

// ---------- admin dashboard ------------------------------------------------
// Every card loads on its own and reports its own failure. Measured reason: a
// reverse-proxied Emby answers /System/Info fine while 404-ing /ScheduledTasks
// and /Sessions -- one dead branch must not blank the page.
const admCard = (id, title, extra='') => `<div class="acard" id="${id}"><div class="ahead"><h3>${title}</h3><span class="cnt"></span><span class="sp"></span>${extra}</div><div class="body"><div class="ablocked">读取中…</div></div></div>`;
// Why a card is empty, in the user's terms. The "Failed to fetch" wording matters:
// a 404 or 403 from a cross-origin Emby carries no CORS header, so the BROWSER
// turns it into a network error and the real status never reaches JS. Measured:
// the same /ScheduledTasks call is a clean 404 from node and an opaque
// "Failed to fetch" from the page. So that case must name both possibilities
// instead of blaming the network.
const blocked = e => {
  const m = String(e?.message || e);
  const why = / 403 /.test(m) ? '当前账号没有权限（需要管理员）'
    : / 404 /.test(m) ? '这台服务器没有开放该接口——常见于被反代裁剪的线路'
    : /Failed to fetch|NetworkError/i.test(m) ? '接口读不到：该线路没开放这个接口（反代裁剪），或需要管理员权限——失败响应不带 CORS 头，浏览器只能报到这一步'
    : m;
  return `<div class="ablocked"><b>不可用</b> · ${esc(why)}</div>`;
};
const fill = (id, html, count) => {
  const c = document.getElementById(id); if (!c) return;
  c.querySelector('.body').innerHTML = html;
  if (count != null) c.querySelector('.cnt').textContent = count;
};
const load = async (id, fn) => { try { await fn(); } catch (e) { fill(id, blocked(e)); } };

// ---------- errors ----------
// A HTTPS page is forbidden by the browser from fetching a http:// origin — the
// request never leaves, surfacing only as "Failed to fetch" with NO CORS hint.
// Local Emby is almost always http://<LAN-ip>, so this is the #1 cause of "it
// should work but doesn't" and must be told apart from a genuine CORS miss.
function mixedContentBlocked(server){
  return location.protocol === 'https:' && /^http:\/\//i.test((server||'').trim());
}
function connErr(server){
  return mixedContentBlocked(server)
    ? '混合内容被拦截:本站是 HTTPS,而 Emby 是 http://。浏览器禁止 HTTPS 页面读取 http 资源——这不是 CORS,前端无法绕过。解法任选:①把 Emby 地址改用 https(如 8920 端口);②在本机用 http 打开 LinWeb(npm run serve);③给 Emby 套一层 https 反代。'
    : '连不上服务器——跨域(CORS)未放行。在 Emby 后台「设置 → 网络 → 跨域 CORS 来源」把本站地址加进白名单(或填 *);若是自签 https 还需先让证书受信。';
}
// 401 and 403 are NOT the same failure and must not share a reaction: 401 means
// the token died (log out), 403 means this account may not do that (stay put).
// They were lumped together, so every permission-denied call -- and the admin
// dashboard is full of them on a non-admin account -- silently logged the user
// out mid-browse.
function fail(e){
  console.error(e);
  const m = String(e?.message || e);
  let msg, expired = false;
  if (/Failed to fetch|NetworkError|CORS/i.test(m)) msg = connErr(EM?.server || $('#lServer')?.value);
  else if (/\b401\b/.test(m)) { msg = '登录已过期,请重新登录。'; expired = true; }
  else if (/\b403\b/.test(m)) msg = '服务器拒绝：当前账号没有这个权限。';
  else msg = m;
  toast(msg, true);
  if (expired) { EM?.logout(); showLogin(); }
}

// Remembered servers: one row each, newest first. A row whose token survived
// logs straight back in; otherwise it just fills the form. This is the whole
// point of keeping the record after logout -- switching server or account never
// means retyping an address.
function renderServers(){
  const list = servers.all();
  const box = $('#lServers');
  if (!list.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<div class="lcap">已记住的服务器</div>` + list.map((s,i)=>`
    <div class="lsrv" data-i="${i}">
      <div class="sic">${hostOf(s.url)[0].toUpperCase()}<img alt=""></div>
      <div class="si"><div class="sn">${hostOf(s.url)}${s.userName?` · ${s.userName}`:''}</div><div class="su">${s.url}${s.lines?.length?` · ${s.lines.length} 条线路`:''}</div></div>
      <span class="sg${s.token?'':' off'}">${s.token?'已登录':'需密码'}</span>
      <button class="sx" data-x="${i}" title="忘记这台服务器">×</button>
    </div>`).join('');
  box.querySelectorAll('.lsrv').forEach(el=>tryIcons(el.querySelector('img'), serverIcons(list[+el.dataset.i])));
  box.querySelectorAll('.lsrv').forEach(el=>el.onclick = e => {
    const s = list[+el.dataset.i];
    if (e.target.dataset.x != null) { e.stopPropagation(); servers.forget(s.url); renderServers(); return; }
    $('#lServer').value = s.url;
    if (s.userName) $('#lUser').value = s.userName;
    const c = EmbyClient.from(s);
    if (c) { EM = c; enterApp(); } else { probeUsers(s.url); $('#lPass').focus(); }
  });
}
const hostOf = u => { try { return new URL(u).host; } catch { return u || '?'; } };
// Walk the candidate icon URLs (server branding, then user avatar) letting the
// browser do the probing: each failure advances to the next, and running out
// drops the <img> so whatever is painted underneath -- the letter, the gradient
// avatar -- shows through. No fetch, no CORS, no round-trip when there is none.
function tryIcons(img, urls){
  if (!img) return;
  const box = img.parentElement;
  let i = 0;
  const next = () => { if (i < urls.length) img.src = urls[i++]; else { img.remove(); box?.classList.remove('has-icon'); } };
  img.onerror = next;
  // a real icon replaces the stand-in letter and its box, rather than sitting on top of it
  img.onload = () => box?.classList.add('has-icon');
  next();
}
async function probeUsers(server){
  try {
    const c = new EmbyClient(server); const users = await c.publicUsers();
    $('#lUsers').innerHTML = (users||[]).slice(0,6).map(u=>`<div class="luser" data-u="${u.Name}"><div class="ua"></div>${u.Name}</div>`).join('');
    $('#lUsers').querySelectorAll('.luser').forEach(el=>el.onclick=()=>{ $('#lUser').value = el.dataset.u; $('#lPass').focus(); });
  } catch { $('#lUsers').innerHTML=''; }
}
let probeTimer=null;
$('#lServer').addEventListener('input', e=>{ clearTimeout(probeTimer); const v=e.target.value.trim(); if(/^https?:\/\/.+/.test(v)) probeTimer=setTimeout(()=>probeUsers(v),500); });
$('#lGo').onclick = async () => {
  const server = $('#lServer').value.trim(), user = $('#lUser').value.trim(), pass = $('#lPass').value;
  $('#lErr').textContent=''; if (!server || !user) { $('#lErr').textContent='请填写服务器地址和用户名。'; return; }
  // Catch the http-server-on-https-page trap before the fetch even fires, so the
  // user gets the real reason instead of a silent "Failed to fetch".
  if (mixedContentBlocked(server)) { $('#lErr').textContent = connErr(server); return; }
  $('#lGo').disabled=true; $('#lGo').textContent='登录中…';
  try {
    EM = new EmbyClient(server); await EM.login(user, pass);
    enterApp();                       // login() already remembered the server
  } catch (e) { $('#lErr').textContent = /Failed to fetch|NetworkError/i.test(e.message) ? connErr(server) : e.message; }
  finally { $('#lGo').disabled=false; $('#lGo').textContent='登录'; }
};
[$('#lUser'),$('#lPass')].forEach(el=>el.addEventListener('keydown',e=>{ if(e.key==='Enter') $('#lGo').click(); }));

$('#avatarBtn').onclick = () => { if (confirm(`退出登录 ${EM?.userName||''}?`)) { EM.logout(); location.reload(); } };

function enterApp(){
  $('#login').classList.remove('open'); $('#app').classList.remove('hidden');
  paintPill();
  $('#avatarBtn').title = `${EM.userName} · 点击退出`;
  $('#avatarBtn').innerHTML = '<img alt="">';
  tryIcons($('#avatarBtn img'), EM.icons());   // server branding, else the user's avatar
  go('home');
  // Refresh the line list in the background; play.html reads it from the same
  // remembered-server record. Best-effort: a server without the add-on has none.
  EM.syncLines().then(l => { if (l.length) { paintPill(); toastLines(l.length); } }).catch(()=>{});
  // The admin rail button is gated on the CURRENT policy, re-read from the
  // server: a restored session can predate the field, and an account can be
  // promoted or demoted between visits.
  $('#adminBtn').hidden = !EM.isAdmin;
  EM.refreshPolicy().then(() => { $('#adminBtn').hidden = !EM.isAdmin; });
}
function paintPill(){
  const lines = EM.allLines();
  const cur = lines.find(l => l.url === EM.server);
  $('#serverPill').textContent = `◉ ${EM.userName||'已连接'}${lines.length>1?` · ${cur?.name||'线路'}`:''}`;
  $('#serverPill').title = `${EM.server} · 点击切换服务器`;
}
let toldLines = false;
function toastLines(n){ if (toldLines) return; toldLines = true; toast(`已同步 ${n} 条线路,播放页可切换`); }
// Switch server / account without logging out: the current server is a row in
// the list, so clicking it comes straight back in.
$('#serverPill').style.cursor = 'pointer';
$('#serverPill').onclick = () => showLogin();

// ---------- boot ----------
(function boot(){
  const restored = EmbyClient.restore();
  if (restored) { EM = restored; enterApp(); }
  else showLogin();
})();
</script>
